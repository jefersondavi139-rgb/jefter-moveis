<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEFTER MÓVEIS | O REI DOS MÓVEIS 👑</title>
    <style>
        /* ESTILO EXTREMO E CHAMATIVO */
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #0062ff;
            --dark-bg: #03070f;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: var(--dark-bg); color: white; overflow-x: hidden;
        }

        /* ANIMAÇÕES */
        @keyframes pulse { 0% { box-shadow: 0 0 10px var(--neon-blue); } 50% { box-shadow: 0 0 30px var(--neon-blue); } 100% { box-shadow: 0 0 10px var(--neon-blue); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        /* TELA DE LOADING */
        #loader {
            position: fixed; top: 0; width: 100%; height: 100%; background: #000;
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }

        /* PÁGINAS (DIVS QUE SE COMPORTAM COMO PÁGINAS) */
        .page { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* HEADER PREMIUM */
        header {
            background: linear-gradient(90deg, #001a33, #0062ff);
            padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 3px solid var(--neon-blue);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.3);
        }

        /* BOTÕES EXTREMOS */
        .mega-btn {
            background: linear-gradient(135deg, var(--deep-blue), var(--neon-blue));
            border: none; border-radius: 15px; color: white; padding: 15px 30px;
            font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4); margin: 10px 0;
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .mega-btn:active { transform: scale(0.95); }

        /* ABAS CORRIGIDAS */
        .tab-bar { display: flex; background: #0a111f; gap: 5px; padding: 5px; }
        .tab {
            flex: 1; padding: 15px; text-align: center; font-weight: bold;
            cursor: pointer; transition: 0.3s; color: #555; border-radius: 10px;
        }
        .tab.active { background: var(--glass); color: var(--neon-blue); border: 1px solid var(--neon-blue); box-shadow: inset 0 0 10px var(--neon-blue); }

        /* CARDS DE PRODUTOS */
        .product-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 25px; padding: 20px; margin: 15px 0; animation: float 4s infinite ease-in-out;
        }
        .price-tag { font-size: 28px; color: var(--neon-blue); font-weight: 900; text-shadow: 0 0 10px var(--neon-blue); }

        /* PAINEL DE CONFIGURAÇÕES REAL */
        .config-card { background: #111; padding: 25px; border-radius: 20px; border-left: 5px solid var(--neon-blue); margin-bottom: 15px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; font-size: 16px; }

        /* FOOTER ADM */
        .nav-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--neon-blue);
        }
    </style>
</head>
<body>

<div id="loader"><h2 style="color:var(--neon-blue)">🔥 CARREGANDO JEFTER MÓVEIS...</h2></div>

<div id="page-login" class="page active" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div style="text-align: center; background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid var(--neon-blue);">
        <h1 style="font-size: 40px; margin-bottom: 0;">JEFTER MÓVEIS 🛋️</h1>
        <p style="color: #888;">O Extremo em Qualidade e Preço</p>
        
        <button class="mega-btn" onclick="fazerLogin('cliente')">👤 ENTRAR COMO CLIENTE</button>
        <button class="mega-btn" style="background:transparent; border: 2px solid var(--neon-blue);" onclick="mostrarTelaAdm()">🔐 PAINEL DO DONO</button>
    </div>
</div>

<div id="page-adm-login" class="page">
    <div style="max-width: 400px; margin: auto;">
        <h2>ACESSO RESTRITO 🚫</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha Secreta">
        <button class="mega-btn" onclick="verificarSenha()">ENTRAR NO SISTEMA</button>
        <button onclick="mudarPagina('page-login')" style="color:gray; background:none; border:none; width:100%; cursor:pointer;">Voltar</button>
    </div>
</div>

<div id="page-loja" class="page">
    <header>
        <div style="font-weight: 900; font-size: 20px;">J <span id="loja-nome">MÓVEIS</span></div>
        <div style="font-size: 14px;">🔥 <span id="user-count">1450</span> ONLINE</div>
    </header>

    <div class="tab-bar">
        <div class="tab active" id="tab-novos" onclick="filtrar('novos')">🆕 NOVOS</div>
        <div class="tab" id="tab-usados" onclick="filtrar('usados')">♻️ USADOS</div>
        <div class="tab" id="tab-seminovos" onclick="filtrar('seminovos')">✨ SEMI</div>
    </div>

    <div id="container-produtos" style="padding-bottom: 100px;">
        </div>

    <div class="nav-bottom" id="menu-adm" style="display: none;">
        <button onclick="mudarPagina('page-config')" style="background:none; border:none; color:white; font-size:25px;">⚙️</button>
        <button onclick="mudarPagina('page-postar')" style="background:var(--neon-blue); border:none; color:black; width:60px; height:60px; border-radius:50%; font-size:30px; margin-top:-30px;">+</button>
        <button onclick="mudarPagina('page-vendas')" style="background:none; border:none; color:white; font-size:25px;">💰</button>
    </div>
</div>

<div id="page-postar" class="page">
    <h2>POSTAR NOVO MÓVEL 🚀</h2>
    <div class="config-card">
        <input type="text" id="prod-nome" placeholder="Nome do Móvel">
        <input type="text" id="prod-preco" placeholder="Valor (R$)">
        <select id="prod-cat">
            <option value="novos">Novo</option>
            <option value="usados">Usado</option>
            <option value="seminovos">Semi-Novo</option>
        </select>
        <button class="mega-btn" onclick="salvarProduto()">PUBLICAR AGORA ✅</button>
        <button class="mega-btn" style="background:#333" onclick="mudarPagina('page-loja')">CANCELAR</button>
    </div>
</div>

<div id="page-config" class="page">
    <h2>CONFIGURAÇÕES AVANÇADAS ⚙️</h2>
    <div class="config-card">
        <label>Nome da Loja:</label>
        <input type="text" id="conf-nome" value="JEFTER MÓVEIS">
        <label>Suporte WhatsApp:</label>
        <input type="text" id="conf-zap" value="(99) 9205-7452">
        <label>Clientes Online (Fake):</label>
        <input type="number" id="conf-online" value="1450">
        <button class="mega-btn" onclick="aplicarConfig()">SALVAR TUDO 💾</button>
        <button class="mega-btn" style="background:#333" onclick="mudarPagina('page-loja')">VOLTAR</button>
    </div>
</div>

<div id="page-vendas" class="page">
    <h2>HISTÓRICO DE VENDAS 💰</h2>
    <div class="config-card" style="text-align: center;">
        <p>Aguardando novas vendas pelo PIX...</p>
        <button class="mega-btn" onclick="mudarPagina('page-loja')">VOLTAR</button>
    </div>
</div>

<script>
    // --- LÓGICA DE MEMÓRIA E PERSISTÊNCIA ---
    let bancoDeDados = JSON.parse(localStorage.getItem('db_jefter')) || {
        nomeLoja: "JEFTER MÓVEIS",
        whatsapp: "(99) 9205-7452",
        online: 1450,
        produtos: []
    };

    let categoriaAtual = 'novos';

    window.onload = () => {
        const sessao = localStorage.getItem('sessao');
        if(sessao) {
            mudarPagina('page-loja');
            if(sessao === 'adm') document.getElementById('menu-adm').style.display = 'flex';
        }
        atualizarLoja();
    };

    function mudarPagina(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function mostrarTelaAdm() { mudarPagina('page-adm-login'); }

    function verificarSenha() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "jefter_28" && p === "Josue_2808") {
            localStorage.setItem('sessao', 'adm');
            location.reload();
        } else { alert("ACESSO NEGADO! Verifique a senha."); }
    }

    function fazerLogin(tipo) {
        document.getElementById('loader').style.display = 'flex';
        setTimeout(() => {
            localStorage.setItem('sessao', tipo);
            location.reload();
        }, 2000);
    }

    // --- FUNÇÕES DE PRODUTO (CORRIGIDAS) ---
    function filtrar(cat) {
        categoriaAtual = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + cat).classList.add('active');
        atualizarLoja();
    }

    function salvarProduto() {
        const nome = document.getElementById('prod-nome').value;
        const preco = document.getElementById('prod-preco').value;
        const cat = document.getElementById('prod-cat').value;

        if(nome && preco) {
            bancoDeDados.produtos.push({ nome, preco, cat, id: Date.now() });
            localStorage.setItem('db_jefter', JSON.stringify(bancoDeDados));
            alert("✅ Postado com Sucesso!");
            mudarPagina('page-loja');
            atualizarLoja();
        }
    }

    function atualizarLoja() {
        const container = document.getElementById('container-produtos');
        const filtrados = bancoDeDados.produtos.filter(p => p.cat === categoriaAtual);
        
        document.getElementById('loja-nome').innerText = bancoDeDados.nomeLoja;
        document.getElementById('user-count').innerText = bancoDeDados.online;

        if(filtrados.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:50px; color:gray;'>Nenhum móvel nesta aba. Postar agora!</p>";
            return;
        }

        container.innerHTML = filtrados.map(p => `
            <div class="product-card">
                <div style="height:150px; background:#111; border-radius:15px; display:flex; align-items:center; justify-content:center;">🖼️</div>
                <div style="padding-top:15px;">
                    <div style="color:var(--gold)">⭐⭐⭐⭐⭐</div>
                    <h3 style="margin:5px 0;">${p.nome}</h3>
                    <div class="price-tag">R$ ${p.preco}</div>
                    <button class="mega-btn" onclick="alert('WhatsApp: ' + bancoDeDados.whatsapp)">COMPRAR AGORA 🛒</button>
                    ${localStorage.getItem('sessao') === 'adm' ? `<button onclick="remover('${p.id}')" style="background:red; border:none; color:white; border-radius:5px; padding:5px;">Apagar Móvel</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function remover(id) {
        bancoDeDados.produtos = bancoDeDados.produtos.filter(p => p.id != id);
        localStorage.setItem('db_jefter', JSON.stringify(bancoDeDados));
        atualizarLoja();
    }

    function aplicarConfig() {
        bancoDeDados.nomeLoja = document.getElementById('conf-nome').value;
        bancoDeDados.whatsapp = document.getElementById('conf-zap').value;
        bancoDeDados.online = document.getElementById('conf-online').value;
        localStorage.setItem('db_jefter', JSON.stringify(bancoDeDados));
        alert("💎 Configurações Atualizadas!");
        mudarPagina('page-loja');
        atualizarLoja();
    }
</script>
</body>
            </html>
