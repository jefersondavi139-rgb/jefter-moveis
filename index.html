<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEFTER MÓVEIS | V21</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue-glow: #00f2ff; --blue-main: #007bff; --bg-deep: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: #fff; font-family: 'Poppins', sans-serif; height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; overflow-y: auto; padding-bottom: 120px; background: var(--bg-deep); }
        .screen-active { display: flex !important; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input, select { width: 90%; max-width: 350px; padding: 16px; background: #0c0c0c; border: 1px solid #222; color: #fff; margin: 8px auto; border-radius: 10px; outline: none; display: block; }
        .btn-blue { width: 90%; max-width: 350px; padding: 18px; border: none; border-radius: 10px; font-weight: 600; background: var(--blue-main); color: #fff; cursor: pointer; margin: 10px auto; display: block; text-align: center; }
        header { padding: 25px; text-align: center; border-bottom: 1px solid #111; z-index: 10; }
        .welcome-user { font-size: 13px; color: var(--blue-glow); margin-top: 5px; }
        .tabs-center { display: flex; justify-content: center; gap: 30px; padding: 20px; }
        .tab { color: #444; font-size: 12px; text-transform: uppercase; cursor: pointer; font-weight: 600; }
        .tab.active { color: var(--blue-glow); border-bottom: 2px solid var(--blue-glow); }
        .shelf { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: rgba(15,15,15,0.8); border-radius: 12px; padding: 12px; border: 1px solid #1a1a1a; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .popup-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:10000; }
        .popup-box { width: 85%; max-width: 320px; background: #0d0d0d; border: 1px solid var(--blue-main); padding: 35px; border-radius: 20px; text-align: center; }
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; height: 75px; background: rgba(8,8,8,0.98); border: 1px solid #222; display: none; justify-content: space-around; align-items: center; border-radius: 20px; z-index: 1000; }
        .nav-icon { font-size: 24px; color: #333; cursor: pointer; }
        .nav-icon.active { color: var(--blue-glow); }
    </style>
</head>
<body onload="App.checkSession()">

    <div id="popup-welcome" class="popup-overlay">
        <div class="popup-box">
            <h3 style="color:var(--blue-glow); margin-bottom:15px;">Bem-vindo!</h3>
            <p id="pop-text" style="font-size:13px; color:#ccc; line-height:1.5;"></p>
            <button class="btn-blue" onclick="App.closePopup()">OK</button>
        </div>
    </div>

    <div id="sc-intro" class="screen screen-active" style="align-items:center; justify-content:center; text-align:center;">
        <h1 style="font-size:38px; color:var(--blue-main);">JEFTER MÓVEIS</h1>
        <button class="btn-blue" onclick="App.go('sc-client-login')">ENTRAR</button>
        <button class="btn-blue" style="background:transparent; border:1px solid #222;" onclick="App.toggleM(true)">ADMIN</button>
    </div>

    <div id="sc-client-login" class="screen" style="align-items:center; justify-content:center;">
        <input type="text" id="c-name" placeholder="Seu nome">
        <button class="btn-blue" onclick="App.startClient()">ACESSAR LOJA</button>
    </div>

    <div id="sc-shop" class="screen">
        <header><h2 style="font-size:18px;">JEFTER MÓVEIS</h2><div id="user-display" class="welcome-user"></div></header>
        <div class="tabs-center"><div class="tab active" id="t-novos" onclick="App.filter('novos')">Novos</div><div class="tab" id="t-usados" onclick="App.filter('usados')">Usados</div></div>
        <div id="shelf" class="shelf"></div>
    </div>

    <div id="sc-pay" class="screen" style="padding:20px; text-align:center;">
        <h2 style="color:var(--blue-glow);">PAGAMENTO PIX</h2>
        <div style="background:#111; padding:20px; border-radius:10px; margin:20px 0;">
            <p id="pix-key-display" style="word-break:break-all;"></p>
        </div>
        <button class="btn-blue" onclick="App.go('sc-shop')">VOLTAR</button>
    </div>

    <div id="sc-config" class="screen" style="padding:30px;">
        <input type="text" id="cfg-pix" placeholder="Chave Pix">
        <button class="btn-blue" onclick="Admin.saveConfigs()">SALVAR COM SENHA</button>
    </div>

    <div id="m-login" class="modal" style="position:fixed; display:none; align-items:center; justify-content:center; background:#000; width:100%; height:100%; z-index:10000;">
        <div><input type="text" id="l-u" placeholder="Login"><input type="password" id="l-p" placeholder="Senha"><button class="btn-blue" onclick="App.loginAdmin()">ACESSAR</button></div>
    </div>

    <nav id="navbar">
        <div class="nav-icon active" id="nav-home" onclick="App.go('sc-shop')">🏠</div>
        <div class="nav-icon" id="adm-cfg" style="display:none" onclick="App.go('sc-config')">⚙️</div>
        <div class="nav-icon" onclick="App.logout()">🚪</div>
    </nav>

    <script>
        const API_URL = "https://jefter-moveis.onrender.com";
        let db = { items: [] };
        let config = JSON.parse(localStorage.getItem('JEF_V21_CFG')) || { pix: "Chave Exemplo" };
        
        const App = {
            checkSession: async () => {
                const res = await fetch(`${API_URL}/api/items`);
                db.items = await res.json();
                const session = localStorage.getItem('JEF_SESSION');
                if(session) {
                    session === 'admin' ? App.showAdminUI() : App.showClientUI(session);
                    App.go('sc-shop');
                    App.render();
                }
            },
            go: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
                document.getElementById(id).classList.add('screen-active');
            },
            startClient: () => {
                const name = document.getElementById('c-name').value;
                if(!name) return alert("Digite seu nome!");
                localStorage.setItem('JEF_SESSION', name);
                App.showClientUI(name);
                App.go('sc-shop');
                App.render();
            },
            showClientUI: (name) => {
                document.getElementById('user-display').innerText = "Olá, " + name;
                document.getElementById('navbar').style.display = 'flex';
            },
            loginAdmin: () => {
                if(document.getElementById('l-u').value === "jefter_28" && document.getElementById('l-p').value === "Josue_2808") {
                    localStorage.setItem('JEF_SESSION', 'admin');
                    location.reload();
                }
            },
            showAdminUI: () => {
                document.getElementById('adm-cfg').style.display = 'block';
                document.getElementById('navbar').style.display = 'flex';
                document.getElementById('cfg-pix').value = config.pix;
            },
            initiatePayment: () => {
                document.getElementById('pix-key-display').innerText = config.pix;
                App.go('sc-pay');
            },
            logout: () => { localStorage.removeItem('JEF_SESSION'); location.reload(); },
            render: () => {
                document.getElementById('shelf').innerHTML = db.items.map(i => `
                    <div class="card">
                        <p>${i.t}</p><p>R$ ${i.p}</p>
                        <button class="btn-blue" onclick="App.initiatePayment()">COMPRAR AGORA</button>
                    </div>
                `).join('');
            }
        };
        const Admin = {
            saveConfigs: () => {
                const senha = prompt("Digite a senha de segurança:");
                if(senha === "JEFTER_SEMNHA") {
                    config.pix = document.getElementById('cfg-pix').value;
                    localStorage.setItem('JEF_V21_CFG', JSON.stringify(config));
                    alert("Salvo!");
                } else { alert("Senha incorreta!"); }
            }
        };
    </script>
</body>
</html>
