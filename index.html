<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefter Móveis | Original</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #03060f;
            --card: #0d162d;
            --neon-blue: #00d2ff;
            --neon-purple: #9d4eff;
            --text: #ffffff;
            --gray: #8b9bb4;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* --- LOADING (Foto 3) --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-bar {
            width: 200px; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-top: 20px; overflow: hidden;
        }
        .loader-fill {
            height: 100%; width: 0%; background: var(--neon-blue);
            transition: width 0.1s linear;
        }

        /* --- CONTAINERS (FOTOS 1 e 2) --- */
        .container {
            width: 90%; max-width: 380px; background: var(--card);
            padding: 35px 25px; border-radius: 30px; text-align: center;
            margin: 20px 0; border: 1px solid rgba(255,255,255,0.08);
            display: none; animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .logo-box {
            width: 80px; height: 80px; background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 20px; margin: 0 auto 20px; display: flex;
            justify-content: center; align-items: center; font-size: 40px;
        }

        /* --- BOTOES E INPUTS --- */
        .btn {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            font-weight: 600; cursor: pointer; text-transform: uppercase;
            margin-bottom: 12px; transition: 0.3s; color: white;
            display: flex; align-items: center; justify-content: center;
        }
        .btn i { margin-right: 10px; }
        .btn-blue { background: linear-gradient(to right, #00c6ff, #0072ff); box-shadow: 0 5px 15px rgba(0,114,255,0.3); }
        .btn-adm { background: rgba(255,255,255,0.05); border: 1px solid var(--neon-purple); color: var(--neon-purple); }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 18px; color: var(--neon-blue); }
        input, select {
            width: 100%; padding: 16px 15px 16px 45px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
            color: white; font-size: 14px;
        }

        /* --- VITRINE --- */
        #vitrine-area { width: 90%; max-width: 380px; display: none; }
        .card-prod {
            background: var(--card); padding: 15px; border-radius: 25px;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }
        .card-prod img { width: 100%; border-radius: 15px; margin-bottom: 10px; }

        .footer { padding: 30px; text-align: center; font-size: 12px; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="logo-box" style="box-shadow: 0 0 20px var(--neon-blue);">🛋️</div>
        <h2 id="load-txt">Entrando... 🚀</h2>
        <div class="loader-bar"><div class="loader-fill" id="fill"></div></div>
    </div>

    <div class="container" id="tela-home" style="display: block;">
        <div class="logo-box">🛋️</div>
        <h1>JEFTER MÓVEIS</h1>
        <p class="subtitle">A melhor qualidade para o seu lar.</p>
        <button class="btn btn-blue" onclick="irPara('tela-cliente')"><i class="fas fa-shopping-cart"></i> Fazer Login como Cliente</button>
        <button class="btn btn-adm" onclick="irPara('tela-admin')"><i class="fas fa-lock"></i> Acesso Administrativo</button>
    </div>

    <div class="container" id="tela-cliente">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" height="30" style="margin-bottom: 20px;">
        <h2>Entrar com Google</h2>
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="c-nome" placeholder="Nome"></div>
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" placeholder="Email"></div>
        <button class="btn btn-blue" onclick="executarAcesso('cliente')">Continuar</button>
        <p onclick="irPara('tela-home')" style="cursor:pointer; font-size:12px; opacity:0.5;">← Voltar</p>
    </div>

    <div class="container" id="tela-admin">
        <div style="font-size: 50px; margin-bottom: 10px;">🔐</div>
        <h2>Área do Jefter</h2>
        <div class="input-group"><i class="fas fa-user-shield"></i><input type="text" id="adm-user" placeholder="Usuário"></div>
        <div class="input-group"><i class="fas fa-key"></i><input type="password" id="adm-pass" placeholder="Senha Secreta"></div>
        <button class="btn btn-adm" style="background:var(--neon-purple); color:white;" onclick="executarAcesso('admin')">Acessar Painel</button>
        <p onclick="irPara('tela-home')" style="cursor:pointer; font-size:12px; opacity:0.5;">← Voltar</p>
    </div>

    <div class="container" id="tela-painel">
        <h3>Postar Novo Produto</h3>
        <input type="text" id="p-nome" placeholder="Nome do Móvel" style="margin-bottom: 10px;">
        <input type="text" id="p-preco" placeholder="Preço (Ex: R$ 500)" style="margin-bottom: 10px;">
        <input type="text" id="p-img" placeholder="Link da Imagem" style="margin-bottom: 10px;">
        <select id="p-cat" style="margin-bottom: 10px;"><option value="Novos">Novos</option><option value="Seminovos">Seminovos</option></select>
        <button class="btn btn-blue" onclick="postar()">Publicar Móvel</button>
        <hr style="opacity: 0.1;">
        <button class="btn" style="background:red;" onclick="localStorage.clear(); location.reload();">Sair e Limpar</button>
    </div>

    <div id="vitrine-area"></div>

    <div class="footer">
        <p>Suporte: (99) 9205-7452</p>
        <p>Postagens: 0 clientes ligaram</p>
    </div>

    <script>
        const CREDENCIAIS = { u: "JEFFG", p: "rrJEFTER.ADMrr" };

        function irPara(id) {
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function executarAcesso(tipo) {
            if(tipo === 'admin') {
                const u = document.getElementById('adm-user').value;
                const p = document.getElementById('adm-pass').value;
                if(u !== CREDENCIAIS.u || p !== CREDENCIAIS.p) return alert("🚫 Senha errada!");
            }

            // LOADING 2.5s (Foto 3)
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            const screen = document.getElementById('loading-screen');
            const fill = document.getElementById('fill');
            const txt = document.getElementById('load-txt');
            screen.style.display = 'flex';

            let progress = 0;
            const msgs = ["Entrando... 🚀", "Quase lá... 🛠️", "Validando... ✅", "Pronto! ✨"];
            
            const timer = setInterval(() => {
                progress += 4;
                fill.style.width = progress + '%';
                if(progress == 24) txt.innerText = msgs[1];
                if(progress == 60) txt.innerText = msgs[2];
                if(progress == 88) txt.innerText = msgs[3];

                if(progress >= 100) {
                    clearInterval(timer);
                    screen.style.display = 'none';
                    if(tipo === 'admin') {
                        localStorage.setItem("log_adm", "true");
                        irPara('tela-painel');
                    } else {
                        document.getElementById('vitrine-area').style.display = 'block';
                        render();
                    }
                }
            }, 100);
        }

        function postar() {
            const n = document.getElementById('p-nome').value;
            const p = document.getElementById('p-preco').value;
            const i = document.getElementById('p-img').value;
            const c = document.getElementById('p-cat').value;
            
            let db = JSON.parse(localStorage.getItem("meu_db")) || [];
            db.push({n, p, i, c});
            localStorage.setItem("meu_db", JSON.stringify(db));
            alert("🛋️ Postado com sucesso!");
            render();
        }

        function render() {
            const area = document.getElementById('vitrine-area');
            const db = JSON.parse(localStorage.getItem("meu_db")) || [];
            area.innerHTML = db.map(item => `
                <div class="card-prod">
                    <img src="${item.i}">
                    <h3>${item.n}</h3>
                    <p style="color:var(--neon-blue); font-weight:bold;">${item.p} (${item.c})</p>
                </div>
            `).join('');
            area.style.display = 'block';
        }

        window.onload = () => {
            if(localStorage.getItem("log_adm") === "true") {
                irPara('tela-painel');
                render();
            }
        };
    </script>
</body>
</html>
