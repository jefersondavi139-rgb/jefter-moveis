<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEFTER MÓVEIS | V14 FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2b04a;
            --gold-dark: #b38b2d;
            --bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg);
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SISTEMA DE TELAS ANTI-REFRESH */
        .screen { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); }
        .screen-active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* INTERFACE CENTRALIZADA */
        .container { text-align: center; width: 100%; padding: 20px; }
        
        .logo-main { margin-bottom: 50px; }
        .logo-main h1 { font-family: 'Cinzel', serif; font-size: 40px; color: var(--gold); letter-spacing: 6px; text-shadow: 0 0 30px rgba(226, 176, 74, 0.3); }
        .logo-main p { font-size: 10px; letter-spacing: 5px; color: #555; text-transform: uppercase; margin-top: 8px; }

        /* BOTÕES SEM LINKS (EVITA O ERRO DE VOLTAR TUDO) */
        .btn-box { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn-ux {
            width: 85%; max-width: 320px; padding: 22px; border: none; border-radius: 15px;
            font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 13px;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .btn-dark { background: #0a0a0a; color: #fff; border: 1px solid #222; }

        /* MODAL DE LOGIN FIXO */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #050505; padding: 40px; border-radius: 25px; width: 90%; max-width: 360px; border: 1px solid var(--gold); text-align: center; }
        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff; outline: none; text-align: center; }

        /* NAVEGAÇÃO INFERIOR */
        nav { position: fixed; bottom: 25px; width: 85%; max-width: 380px; height: 70px; background: rgba(15,15,15,0.9); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid #222; display: none; justify-content: space-around; align-items: center; z-index: 500; }
        .nav-item { font-size: 24px; cursor: pointer; color: #444; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="sc-intro" class="screen screen-active">
        <div class="container">
            <div class="logo-main">
                <h1>JEFTER</h1>
                <p>Móveis de Luxo</p>
            </div>
            <div class="btn-box">
                <button type="button" class="btn-ux btn-gold" onclick="App.start('client', event)">
                    🛋️ LOGAR COMO CLIENTE
                </button>
                <button type="button" class="btn-ux btn-dark" onclick="App.toggleM(true, event)">
                    🔑 ACESSO DO DONO
                </button>
            </div>
        </div>
    </div>

    <div id="sc-shop" class="screen">
        <div style="padding:20px; width:100%; text-align:center; font-family:'Cinzel'; color:var(--gold); border-bottom: 1px solid #111;">
            GALERIA JM
        </div>
        <div id="shelf" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px; width:100%; overflow-y:auto;">
            <p style="grid-column: span 2; text-align:center; color:#333; margin-top:50px;">Nenhum móvel cadastrado ainda.</p>
        </div>
    </div>

    <div id="m-login" class="modal">
        <div class="modal-card">
            <h2 style="color:var(--gold); margin-bottom:20px; font-family:'Cinzel';">SISTEMA INTERNO</h2>
            <input type="text" id="l-user" placeholder="Usuário">
            <input type="password" id="l-pass" placeholder="Senha">
            <button class="btn-ux btn-gold" style="width:100%" onclick="App.login(event)">ACESSAR PAINEL</button>
            <p onclick="App.toggleM(false, event)" style="margin-top:20px; color:#555; font-size:12px; cursor:pointer;">CANCELAR</p>
        </div>
    </div>

    <nav id="navbar">
        <div class="nav-item active" onclick="App.go('sc-shop', event)">🏠</div>
        <div id="btn-post" class="nav-item" style="display:none">➕</div>
        <div class="nav-item" onclick="location.reload()">🚪</div>
    </nav>

    <script>
        const App = {
            // Função que muda de tela SEM recarregar
            go: (id, e) => {
                if(e) e.preventDefault(); // Comando crucial para parar o refresh do vídeo
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
                document.getElementById(id).classList.add('screen-active');
            },

            toggleM: (show, e) => {
                if(e) e.preventDefault();
                document.getElementById('m-login').style.display = show ? 'flex' : 'none';
            },

            start: (role, e) => {
                if(e) e.preventDefault();
                document.getElementById('navbar').style.display = 'flex';
                if(role === 'adm') document.getElementById('btn-post').style.display = 'block';
                App.go('sc-shop');
            },

            login: (e) => {
                if(e) e.preventDefault();
                const u = document.getElementById('l-user').value;
                const p = document.getElementById('l-pass').value;
                
                if(u === "jefter_28" && p === "Josue_2808") {
                    App.toggleM(false);
                    App.start('adm');
                } else {
                    alert("Dados incorretos!");
                }
            }
        };
    </script>
</body>
</html>
