<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEFTER MÓVEIS | LUXURY V12</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2b04a;
            --gold-dark: #b38b2d;
            --accent: #00d9ff;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --card-grad: linear-gradient(145deg, #111, #050505);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; height: 100vh; overflow: hidden; }

        /* ENGINE DE TELAS (ANTI-REFRESH) */
        .screen { display: none; height: 100vh; width: 100%; overflow-y: auto; padding-bottom: 100px; position: absolute; background: var(--bg); transition: 0.4s; }
        .screen-active { display: block !important; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* TELA DE ENTRADA ÉPICA */
        #sc-intro { display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .logo-box { text-align: center; margin-bottom: 50px; }
        .logo-box h1 { font-family: 'Cinzel', serif; font-size: 38px; color: var(--gold); letter-spacing: 4px; text-shadow: 0 0 30px rgba(226, 176, 74, 0.3); }
        .logo-box p { font-size: 10px; letter-spacing: 5px; color: #555; text-transform: uppercase; margin-top: 10px; }

        /* BOTÕES DE ALTA COSTURA */
        .btn-premium {
            width: 80%; max-width: 300px; padding: 20px; border: none; border-radius: 12px;
            font-weight: 600; text-transform: uppercase; cursor: pointer; margin: 12px 0;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #000; box-shadow: 0 10px 20px rgba(179, 139, 45, 0.2); }
        .btn-glass { background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }

        /* INTERFACE DA LOJA */
        header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .categories { display: flex; padding: 15px; gap: 12px; overflow-x: auto; scrollbar-width: none; }
        .cat-item { 
            padding: 10px 25px; border-radius: 50px; font-size: 11px; white-space: nowrap; 
            background: #111; color: #666; border: 1px solid transparent; transition: 0.3s;
        }
        .cat-item.active { background: rgba(226, 176, 74, 0.1); color: var(--gold); border-color: var(--gold); }

        /* GRID DE PRODUTOS PREMIUM */
        .shelf { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 18px; }
        .product-card { 
            background: var(--card-grad); border-radius: 24px; padding: 12px; 
            border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .product-card img { width: 100%; height: 170px; border-radius: 18px; object-fit: cover; }
        .product-info { padding: 10px 5px; }
        .product-title { font-size: 13px; font-weight: 400; color: #ccc; margin-bottom: 5px; }
        .product-price { color: var(--gold); font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: space-between; }

        /* MENU INFERIOR FLUTUANTE */
        nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 70px; background: rgba(15, 15, 15, 0.8); 
            backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.08);
            display: none; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-icon { color: #444; font-size: 20px; cursor: pointer; transition: 0.3s; padding: 10px; }
        .nav-icon.active { color: var(--gold); transform: translateY(-5px); }

        /* MODAL DE LOGIN */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-content { background: #0a0a0a; padding: 40px; border-radius: 35px; width: 90%; max-width: 380px; border: 1px solid var(--gold); text-align: center; }
        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 15px; border: 1px solid #1a1a1a; background: #000; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <div id="sc-intro" class="screen screen-active">
        <div class="logo-box">
            <h1>JEFTER</h1>
            <p>Móveis Sob Medida</p>
        </div>
        <button class="btn-premium btn-gold" onclick="App.start('client')">Entrar na Galeria</button>
        <button class="btn-premium btn-glass" onclick="App.toggleM(true)">Administração</button>
    </div>

    <div id="sc-shop" class="screen">
        <header>
            <div style="font-family:'Cinzel'; color:var(--gold); font-size: 18px;">JM</div>
            <div onclick="App.go('sc-cart')" style="position:relative; cursor:pointer">
                🛒 <span id="cart-badge" style="position:absolute; top:-8px; right:-8px; background:var(--gold); color:#000; font-size:10px; padding:2px 6px; border-radius:50%; font-weight:700;">0</span>
            </div>
        </header>
        <div class="categories">
            <div class="cat-item active" id="c-novos" onclick="App.filter('novos')">Novos</div>
            <div class="cat-item" id="c-usados" onclick="App.filter('usados')">Seminovos</div>
            <div class="cat-item" id="c-promos" onclick="App.filter('promos')">Ofertas</div>
        </div>
        <div id="shelf" class="shelf"></div>
    </div>

    <div id="sc-post" class="screen" style="padding: 30px;">
        <h2 style="font-family:'Cinzel'; color:var(--gold); margin-bottom:30px;">NOVO PRODUTO</h2>
        <input type="text" id="in-t" placeholder="Nome do Móvel">
        <input type="text" id="in-p" placeholder="Valor (Ex: 1.500)">
        <select id="in-c" style="width:100%; padding:18px; border-radius:15px; background:#000; color:#fff; border:1px solid #1a1a1a; margin-bottom:10px;">
            <option value="novos">Categoria: Novos</option>
            <option value="usados">Categoria: Seminovos</option>
            <option value="promos">Categoria: Ofertas</option>
        </select>
        <div style="margin: 20px 0;">
            <label style="font-size:12px; color:#555;">FOTO DO PRODUTO</label>
            <input type="file" id="in-f" accept="image/*" style="border:none; padding:10px;">
        </div>
        <button class="btn-premium btn-gold" style="width:100%" onclick="App.save()">Publicar Agora</button>
    </div>

    <div id="sc-cart" class="screen" style="padding: 30px;">
        <h2 style="font-family:'Cinzel'; margin-bottom:30px;">MEU CARRINHO</h2>
        <div id="cart-list"></div>
        <div id="cart-total" style="font-size:28px; color:var(--gold); margin: 40px 0; font-weight: 300;">Total: R$ 0,00</div>
        <button class="btn-premium btn-gold" style="width:100%" onclick="App.zap()">Finalizar no WhatsApp</button>
        <button class="btn-premium btn-glass" style="width:100%" onclick="App.go('sc-shop')">Continuar Comprando</button>
    </div>

    <div id="m-login" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold); margin-bottom:25px; letter-spacing:2px;">SECURITY CHECK</h3>
            <p id="l-err" style="color:#ff4444; font-size:11px; display:none; margin-bottom:15px;">Dados Inválidos</p>
            <input type="text" id="l-u" placeholder="Admin ID">
            <input type="password" id="l-s" placeholder="Passcode">
            <button class="btn-premium btn-gold" style="width:100%" onclick="App.login()">Acessar Painel</button>
            <button class="btn-premium btn-glass" style="width:100%; margin-top:5px;" onclick="App.toggleM(false)">Voltar</button>
        </div>
    </div>

    <nav id="navbar">
        <div class="nav-icon" onclick="App.go('sc-shop')">🏠</div>
        <div class="nav-icon" onclick="App.go('sc-cart')">🛒</div>
        <div id="nv-adm" class="nav-icon" style="display:none" onclick="App.go('sc-post')">➕</div>
        <div class="nav-icon" onclick="location.reload()">🚪</div>
    </nav>

    <script>
        const App = {
            db: JSON.parse(localStorage.getItem('J_LUX_V12')) || { items: [] },
            cart: [],
            cat: 'novos',
            img64: "",

            go: (id) => {
                // Impede que o clique padrão do navegador recarregue a página
                if(window.event) window.event.preventDefault(); 
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
                document.getElementById(id).classList.add('screen-active');
            },

            start: (role) => {
                document.getElementById('navbar').style.display = 'flex';
                if(role === 'adm') document.getElementById('nv-adm').style.display = 'block';
                App.go('sc-shop');
                App.render();
            },

            toggleM: (s) => { document.getElementById('m-login').style.display = s ? 'flex' : 'none'; },

            login: () => {
                const u = document.getElementById('l-u').value;
                const s = document.getElementById('l-s').value;
                if(u === "jefter_28" && s === "Josue_2808") {
                    App.toggleM(false); App.start('adm');
                } else { document.getElementById('l-err').style.display = 'block'; }
            },

            filter: (c) => {
                App.cat = c;
                document.querySelectorAll('.cat-item').forEach(t => t.classList.remove('active'));
                document.getElementById('c-'+c).classList.add('active');
                App.render();
            },

            render: () => {
                const shelf = document.getElementById('shelf');
                const list = App.db.items.filter(i => i.cat === App.cat);
                shelf.innerHTML = list.map(i => `
                    <div class="product-card">
                        <img src="${i.img}">
                        <div class="product-info">
                            <div class="product-title">${i.t}</div>
                            <div class="product-price">
                                R$ ${i.p}
                                <span onclick="App.add(${i.id})" style="cursor:pointer; font-size:20px;">⊕</span>
                            </div>
                            ${document.getElementById('nv-adm').style.display === 'block' ? `<button onclick="App.del(${i.id})" style="background:none; border:none; color:red; font-size:9px; margin-top:10px;">Remover</button>` : ''}
                        </div>
                    </div>
                `).join('');
            },

            save: () => {
                const t = document.getElementById('in-t').value;
                const p = document.getElementById('in-p').value;
                const c = document.getElementById('in-c').value;
                if(!t || !App.img64) return;
                App.db.items.push({ id: Date.now(), t, p, cat: c, img: App.img64 });
                localStorage.setItem('J_LUX_V12', JSON.stringify(App.db));
                App.go('sc-shop'); App.render();
            },

            add: (id) => {
                App.cart.push(App.db.items.find(i => i.id === id));
                document.getElementById('cart-badge').innerText = App.cart.length;
                App.updateCart();
                App.go('sc-cart');
            },

            updateCart: () => {
                const box = document.getElementById('cart-list');
                let total = 0;
                box.innerHTML = App.cart.map((i, idx) => {
                    total += parseFloat(i.p.replace('.','').replace(',','.'));
                    return `<div style="display:flex; background:var(--glass); padding:20px; border-radius:20px; margin-bottom:12px; align-items:center;">
                        <img src="${i.img}" style="width:50px; height:50px; border-radius:12px; margin-right:20px;">
                        <div style="flex:1;">
                            <div style="font-size:14px; color:#fff;">${i.t}</div>
                            <div style="color:var(--gold); font-weight:600;">R$ ${i.p}</div>
                        </div>
                        <button onclick="App.rem(${idx})" style="background:none; border:none; color:#555;">✕</button>
                    </div>`;
                }).join('');
                document.getElementById('cart-total').innerText = "Total: R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            },

            rem: (idx) => { App.cart.splice(idx,1); App.updateCart(); document.getElementById('cart-badge').innerText = App.cart.length; },

            zap: () => {
                let m = "Olá Jefter! Tenho interesse em:\n" + App.cart.map(i => `- ${i.t}`).join("\n");
                window.open(`https://wa.me/559992057452?text=${encodeURIComponent(m)}`);
            },

            del: (id) => {
                App.db.items = App.db.items.filter(i => i.id !== id);
                localStorage.setItem('J_LUX_V12', JSON.stringify(App.db));
                App.render();
            }
        };

        document.getElementById('in-f').addEventListener('change', (e) => {
            const r = new FileReader(); r.onload = () => App.img64 = r.result; r.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
