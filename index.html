<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefter Móveis - Loja Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* MANTENDO SUA INTERFACE ORIGINAL AZUL ESCURO */
        :root {
            --bg-color: #050a18;
            --card-bg: #0d162d;
            --accent-blue: #00a8ff;
            --accent-purple: #4b2cb3;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(0,168,255,0.4);
        }

        h1 { font-size: 24px; margin-bottom: 10px; letter-spacing: 1px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 25px; }

        .stats {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .btn-client { background: linear-gradient(to right, #00a8ff, #0066ff); }
        .btn-admin { background: rgba(75, 44, 179, 0.2); border: 1px solid var(--accent-purple); }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* Estilo para o Painel que estava sumindo */
        #panel-adm {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-icon">🛋️</div>
        <h1>JEFTER MÓVEIS</h1>
        <p>Boas-vindas! Aqui você compra produtos de melhor qualidade.</p>

        <div class="stats">
            👥 <span id="count">2</span> clientes já entraram
        </div>

        <button class="btn btn-client" onclick="alert('Indo para a loja...')">🛒 Entrar como Cliente</button>
        <button class="btn btn-admin" id="btn-login" onclick="fazerLogin()">🔐 Acesso Administrativo</button>
        <button class="btn btn-admin" id="btn-sair" style="display:none;" onclick="fazerLogout()">🚪 Sair</button>

        <div id="panel-adm">
            <h3>Postar Novo Móvel</h3>
            <input type="text" id="nome-item" placeholder="Nome do Móvel">
            <input type="text" id="preco-item" placeholder="Preço (Ex: R$ 500)">
            <input type="text" id="img-item" placeholder="Link da Foto">
            <button class="btn btn-client" onclick="salvarProduto()">Postar na Vitrine</button>
        </div>
        
        <div id="vitrine" style="margin-top:20px;"></div>
    </div>

    <script>
        /* JAVASCRIPT CORRIGIDO - LOGIN E PERSISTÊNCIA */
        const ADM_USER = "JEFFG";
        const ADM_PASS = "rrJEFTER.ADMrr";

        // 1. Verifica se já estava logado ao abrir a página
        function checkLogin() {
            const status = localStorage.getItem("logado");
            if (status === "true") {
                document.getElementById("panel-adm").style.display = "block";
                document.getElementById("btn-login").style.display = "none";
                document.getElementById("btn-sair").style.display = "block";
            }
            renderizarVitrine();
        }

        function fazerLogin() {
            const user = prompt("Usuário:");
            const pass = prompt("Senha:");

            if (user === ADM_USER && pass === ADM_PASS) {
                localStorage.setItem("logado", "true");
                alert("Acesso concedido!");
                location.reload(); // Recarrega para aplicar as mudanças
            } else {
                alert("Dados incorretos!");
            }
        }

        function fazerLogout() {
            localStorage.removeItem("logado");
            location.reload();
        }

        // 2. Salva o produto para ele NÃO SUMIR ao dar F5
        function salvarProduto() {

    </script>
</body>
</html>
