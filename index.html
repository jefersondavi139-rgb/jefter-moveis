<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEFTER MÓVEIS | V13 PATTERN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2b04a;
            --gold-dark: #b38b2d;
            --bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* FUNDO COM OS EMOJIS/ÍCONES EM PRETO */
        body { 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://i.ibb.co/Vp8p3YQ/furniture-pattern.jpg'); /* Usei uma versão dark da sua imagem */
            background-size: 300px;
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }

        .screen { display: none; height: 100vh; width: 100%; overflow-y: auto; padding-bottom: 100px; position: absolute; }
        .screen-active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.6s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        /* LOGO CENTRALIZADA */
        .logo-main { text-align: center; margin-bottom: 50px; }
        .logo-main h1 { font-family: 'Cinzel', serif; font-size: 45px; color: var(--gold); letter-spacing: 8px; text-shadow: 0 0 40px rgba(226, 176, 74, 0.4); }
        .logo-main p { font-size: 10px; letter-spacing: 7px; color: #777; text-transform: uppercase; margin-top: 10px; }

        /* BOTÕES CENTRALIZADOS */
        .btn-box { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 18px; }
        .btn-ux {
            width: 85%; max-width: 340px; padding: 22px; border: none; border-radius: 12px;
            font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            font-size: 13px; letter-spacing: 1px;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #000; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .btn-dark { background: rgba(10, 10, 10, 0.8); color: #fff; border: 1px solid #222; backdrop-filter: blur(10px); }
        .btn-ux:active { transform: scale(0.95); }

        /* MODAL DE LOGIN */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal-card { background: #080808; padding: 40px; border-radius: 25px; width: 90%; max-width: 380px; border: 1px solid var(--gold); text-align: center; }
        input { width: 100%; padding: 20px; margin: 12px 0; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff; outline: none; }

        /* NAVBAR */
        nav { position: fixed; bottom: 30px; width: 90%; max-width: 400px; height: 75px; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); display: none; justify-content: space-around; align-items: center; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

    <div id="sc-intro" class="screen screen-active">
        <div class="logo-main">
            <h1>JEFTER</h1>
            <p>Premium Furniture</p>
        </div>
        
        <div class="btn-box">
            <button class="btn-ux btn-gold" onclick="App.start('client')">
                🛋️ LOGAR COMO CLIENTE
            </button>
            <button class="btn-ux btn-dark" onclick="App.toggleM(true)">
                🔑 ACESSO DO DONO
            </button>
        </div>
    </div>

    <div id="sc-shop" class="screen">
        <div style="padding:20px; width:100%; text-align:center; font-family:'Cinzel'; color:var(--gold); font-size:24px;">GALERIA JEFTER</div>
        <div id="shelf" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px; width:100%;"></div>
    </div>

    <div id="m-login" class="modal">
        <div class="modal-card">
            <h2 style="color:var(--gold); margin-bottom:20px; font-family:'Cinzel';">ADMIN LOGIN</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-ux btn-gold" style="width:100%" onclick="App.login()">ENTRAR NO SISTEMA</button>
            <p onclick="App.toggleM(false)" style="margin-top:20px; color:#555; font-size:12px; cursor:pointer;">VOLTAR</p>
        </div>
    </div>

    <nav id="navbar">
        <div onclick="App.go('sc-shop')" style="font-size:25px">🏠</div>
        <div id="adm-btn" style="display:none; font-size:25px">➕</div>
        <div onclick="location.reload()" style="font-size:25px">🚪</div>
    </nav>

    <script>
        const App = {
            go: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
                document.getElementById(id).classList.add('screen-active');
            },
            toggleM: (s) => document.getElementById('m-login').style.display = s ? 'flex' : 'none',
            start: (role) => {
                document.getElementById('navbar').style.display = 'flex';
                if(role === 'adm') document.getElementById('adm-btn').style.display = 'block';
                App.go('sc-shop');
            },
            login: () => {
                if(document.getElementById('user').value === "jefter_28" && document.getElementById('pass').value === "Josue_2808") {
                    App.toggleM(false); App.start('adm');
                } else { alert("Erro de Login!"); }
            }
        };
    </script>
</body>
</html>
