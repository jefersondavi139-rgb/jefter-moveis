<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Furniture Store</title>
    
    <style>
        :root {
            --primary: #d4af37;
            --bg: #000000;
            --card-bg: #111111;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
        }

        /* ANIMAÇÕES ORIGINAIS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        /* TELA DE LOGIN COM EFEITO DE BLUR */
        #tela-login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: var(--transition);
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            width: 320px;
        }

        /* ESTILO DOS INPUTS PREMIUM */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            outline: none;
            transition: var(--transition);
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        /* BOTÕES COM HOVER ORIGINAL */
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #fff;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* LAYOUT DA VITRINE E PRODUTOS */
        header {
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            animation: slideIn 0.8s ease;
        }

        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .container { padding: 40px 5%; }

        #area-adm {
            background: #0a0a0a;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 50px;
            border: 1px dashed var(--primary);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* CARD DO MÓVEL COM ANIMAÇÃO DE HOVER */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid #222;
            animation: fadeIn 0.5s ease backwards;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: var(--transition);
        }

        .card:hover img { transform: scale(1.1); }

        .card-info { padding: 20px; text-align: center; }
        .card-info h3 { margin-bottom: 10px; font-size: 1.3rem; }
        .card-info p { color: var(--primary); font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; }
        
        .btn-logout { 
            width: auto; 
            background: transparent; 
            color: #ff4444; 
            border: 1px solid #ff4444; 
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-box">
            <h2>JEFF ADMIN</h2>
            <input type="text" id="userField" placeholder="Usuário">
            <input type="password" id="passField" placeholder="Senha">
            <button onclick="validaAcesso()">Acessar Painel</button>
            <p style="color: #666; margin-top: 20px; cursor: pointer; font-size: 12px;" onclick="fecharLogin()">Entrar como Visitante</p>
        </div>
    </div>

    <header>
        <div class="logo">JEFF<span>STORE</span></div>
        <button id="logoutBtn" class="btn-logout" style="display:none;" onclick="sair()">Logout</button>
    </header>

    <div class="container">
        <section id="area-adm">
            <h2 style="margin-bottom: 20px;">Gerenciar Estoque</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <input type="text" id="pNome" placeholder="Nome do Móvel">
                <input type="text" id="pPreco" placeholder="Preço (R$)">
                <input type="text" id="pImg" placeholder="Link da Foto">
                <button onclick="adicionarMovel()">Postar Agora</button>
            </div>
        </section>

        <h1 style="margin-bottom: 30px; text-align: center;">Coleção Premium</h1>
        <div id="vitrine" class="grid-produtos">
            </div>
    </div>

    <script>
        // --- LOGICA DE PERSISTÊNCIA (CORREÇÃO 1) ---
        window.onload = () => {
            if(localStorage.getItem('sessaoAtiva') === 'true') {
                liberarAdm();
            }
            renderizarVitrine();
        };

        function fecharLogin() {
            document.getElementById('tela-login').style.opacity = '0';
            setTimeout(() => { document.getElementById('tela-login').style.display = 'none'; }, 400);
        }

        // --- LOGIN COM SUAS CREDENCIAIS ---
        function validaAcesso() {
            const u = document.getElementById('userField').value;
            const p = document.getElementById('passField').value;

            if(u === "JEFFG" && p === "rrJEFTER.ADMrr") {
                localStorage.setItem('sessaoAtiva', 'true');
                liberarAdm();
                fecharLogin();
            } else {
                alert("Acesso negado, Jeff!");
            }
        }

        function liberarAdm() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('area-adm').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'block';
        }

        function sair() {
            localStorage.removeItem('sessaoAtiva');
            location.reload();
        }

        // --- CORREÇÃO 2: SINCRONIZAÇÃO ADM -> CLIENTE ---
        function adicionarMovel() {
            const n = document.getElementById('pNome').value;
            const pr = document.getElementById('pPreco').value;
            const im = document.getElementById('pImg').value;

            if(n && pr && im) {
                let estoque = JSON.parse(localStorage.getItem('meuEstoque')) || [];
                estoque.push({ nome: n, preco: pr, imagem: im });
                localStorage.setItem('meuEstoque', JSON.stringify(estoque));

                alert("Móvel adicionado com sucesso!");
                
                // Limpar campos
                document.getElementById('pNome').value = "";
                document.getElementById('pPreco').value = "";
                document.getElementById('pImg').value = "";

                renderizarVitrine();
            }
        }

        function renderizarVitrine() {
            const lista = JSON.parse(localStorage.getItem('meuEstoque')) || [];
            const box = document.getElementById('vitrine');
            box.innerHTML = "";

            lista.forEach((item, index) => {
                box.innerHTML += `
                    <div class="card" style="animation-delay: ${index * 0.1}s">
                        <img src="${item.imagem}" onerror="this.src='https://via.placeholder.com/400x300?text=Imagem+Indisponivel'">
                        <div class="card-info">
                            <h3>${item.nome}</h3>
                            <p>R$ ${item.preco}</p>
                            <button onclick="window.open('https://wa.me/seunumeroaqui')">Comprar</button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
