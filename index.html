<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JEFTER MOVEIS</title>
    <style>
        :root { --bg: #121212; --roxo: #8A2BE2; --rosa: #FF00FF; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        h1 { color: var(--rosa); text-align: center; margin-bottom: 30px; }
        .nav { text-align: center; margin-bottom: 20px; }
        button { background: var(--roxo); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: var(--rosa); }
        
        /* Estilo da Loja */
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: #1e1e1e; padding: 15px; border: 1px solid var(--roxo); border-radius: 10px; text-align: center; width: 200px; }
        
        /* Painel ADM */
        #painel-adm { display: none; background: #252525; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; border: 1px solid var(--rosa); }
        input { width: 90%; padding: 10px; margin: 5px 0; background: #333; border: 1px solid var(--roxo); color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>JEFTER MOVEIS</h1>

    <div class="nav">
        <button onclick="mostrar('loja')">Ver Loja</button>
        <button onclick="acessarADM()">Painel ADM</button>
    </div>

    <div id="loja">
        <div id="vitrine" class="container"></div>
    </div>

    <div id="painel-adm">
        <h3>Painel Administrativo</h3>
        <input type="text" id="nome" placeholder="Nome do Móvel">
        <input type="text" id="preco" placeholder="Preço (ex: 999.00)">
        <input type="text" id="img" placeholder="Link da Imagem (URL)">
        <button onclick="adicionar()">Salvar Produto</button>
        <p style="color: gray; font-size: 12px; margin-top: 10px;">Apenas para administradores.</p>
    </div>

    <script>
        let produtos = [];

        function mostrar(aba) {
            document.getElementById('loja').style.display = aba === 'loja' ? 'block' : 'none';
            document.getElementById('painel-adm').style.display = aba === 'adm' ? 'block' : 'none';
        }

        function acessarADM() {
            let senha = prompt("Digite a senha do administrador:");
            if (senha === "JEFTER.123") {
                mostrar('adm');
            } else {
                alert("Senha incorreta!");
            }
        }

        function adicionar() {
            let nome = document.getElementById('nome').value;
            let preco = document.getElementById('preco').value;
            let img = document.getElementById('img').value;

            if(nome && preco) {
                produtos.push({ nome, preco, img });
                renderizar();
                // Limpar campos
                document.getElementById('nome').value = '';
                document.getElementById('preco').value = '';
                document.getElementById('img').value = '';
                alert("Produto adicionado com sucesso!");
            } else {
                alert("Preencha os campos!");
            }
        }

        function renderizar() {
            let vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = produtos.map(p => `
                <div class="card">
                    <img src="${p.img}" width="100" style="border-radius:5px" onerror="this.src='https://via.placeholder.com/100'">
                    <h3>${p.nome}</h3>
                    <p>R$ ${p.preco}</p>
                    <button>Comprar</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
