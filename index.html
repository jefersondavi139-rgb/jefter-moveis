<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEFTER MÓVEIS | V5 EXTREME</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --blue: #0062ff; --dark: #010307; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* GERENCIAMENTO DE TELAS */
        .page { display: none; min-height: 100vh; width: 100%; padding-bottom: 90px; box-sizing: border-box; }
        .active-page { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER */
        header { padding: 15px; background: #000; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; sticky: top; z-index: 1000; }
        
        /* ABAS DA VITRINE */
        .tab-bar { display: flex; background: #050a14; border-bottom: 1px solid #111; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #555; font-weight: bold; font-size: 13px; }
        .tab.active { color: var(--neon); border-bottom: 3px solid var(--neon); background: rgba(0,242,255,0.05); }

        /* CARDS E GRID */
        .grid { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--glass); border-radius: 20px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .card img { width: 100%; height: 140px; border-radius: 15px; object-fit: cover; background: #000; }
        .price { color: var(--neon); font-family: 'Orbitron'; font-size: 18px; margin: 8px 0; }
        
        /* BOTÕES */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; font-family: 'Poppins'; }
        .btn-buy { background: linear-gradient(90deg, var(--blue), var(--neon)); color: white; }
        .btn-sec { background: #222; color: white; }

        /* MENU INFERIOR FIXO */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #000; height: 75px; display: none; justify-content: space-around; align-items: center; border-top: 2px solid var(--blue); z-index: 2000; }
        .nav-item { text-align: center; font-size: 10px; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--neon); }

        /* MODAIS E FORMULÁRIOS INTERNOS */
        .modal { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 5000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0f1a; padding: 30px; border-radius: 25px; border: 1px solid var(--blue); width: 90%; max-width: 400px; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #000; color: white; box-sizing: border-box; }

        /* CARRINHO */
        .cart-item { display: flex; gap: 15px; background: var(--glass); padding: 10px; border-radius: 15px; margin-bottom: 10px; align-items: center; }
        .cart-item img { width: 50px; height: 50px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="page-start" class="page active-page" style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <h1 style="font-family:'Orbitron'; font-size:30px; color:var(--neon);">JEFTER MÓVEIS</h1>
        <p style="color:#444; margin-bottom:30px;">QUALIDADE AO SEU ALCANCE</p>
        <button class="btn btn-buy" style="max-width:280px" onclick="entrarComo('cliente')">👤 ENTRAR NA LOJA</button>
        <button class="btn btn-sec" style="max-width:280px; margin-top:15px; border:1px solid #333" onclick="abrirModalAdm()">🔐 ACESSO DO DONO</button>
    </div>

    <div id="page-shop" class="page">
        <header>
            <div style="font-family:'Orbitron'; color:var(--neon)">J MÓVEIS</div>
            <div onclick="showPage('page-cart')" style="cursor:pointer">🛒 <span id="cart-badge">0</span></div>
        </header>
        <div class="tab-bar">
            <div class="tab active" id="t-novos" onclick="filtrar('novos')">NOVOS</div>
            <div class="tab" id="t-usados" onclick="filtrar('usados')">USADOS</div>
            <div class="tab" id="t-seminovos" onclick="filtrar('seminovos')">SEMI</div>
        </div>
        <div id="grid-produtos" class="grid"></div>
    </div>

    <div id="page-details" class="page">
        <div style="padding:20px;">
            <h2 id="view-nome"></h2>
            <img id="view-img" src="" style="width:100%; border-radius:20px; height:250px; object-fit:cover;">
            <div class="price" id="view-preco" style="font-size:28px;"></div>
            <label>Escolha a Cor:</label>
            <select id="view-cor">
                <option>Preto Premium</option>
                <option>Branco Neve</option>
                <option>Madeira Rústica</option>
            </select>
            <label>Quantidade:</label>
            <input type="number" id="view-qtd" value="1" min="1">
            <button class="btn btn-buy" onclick="adicionarAoCarrinho()">ADICIONAR AO CARRINHO 🛒</button>
            <button class="btn btn-sec" onclick="showPage('page-shop')">VOLTAR</button>
        </div>
    </div>

    <div id="page-cart" class="page">
        <div style="padding:20px;">
            <h2>MEU CARRINHO</h2>
            <div id="lista-carrinho"></div>
            <div id="total-carrinho" style="font-size:22px; font-weight:bold; margin:20px 0; color:var(--neon)">Total: R$ 0,00</div>
            <button class="btn btn-buy" onclick="finalizarPedido()">FINALIZAR NO WHATSAPP ✅</button>
            <button class="btn btn-sec" onclick="showPage('page-shop')">CONTINUAR COMPRANDO</button>
        </div>
    </div>

    <div id="page-post" class="page">
        <div style="padding:20px;">
            <h2>NOVA POSTAGEM 📸</h2>
            <input type="text" id="post-nome" placeholder="Nome do Móvel">
            <input type="text" id="post-preco" placeholder="Preço (Ex: 850)">
            <select id="post-cat">
                <option value="novos">Categoria: Novos</option>
                <option value="usados">Categoria: Usados</option>
                <option value="seminovos">Categoria: Semi-Novos</option>
            </select>
            <label>Selecionar Foto:</label>
            <input type="file" id="post-file" accept="image/*">
            <button class="btn btn-buy" onclick="salvarNovoMovel()">PUBLICAR AGORA</button>
        </div>
    </div>

    <div id="modal-adm" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--neon); font-family:'Orbitron';">LOGIN DONO</h2>
            <input type="text" id="login-u" placeholder="Usuário">
            <input type="password" id="login-p" placeholder="Senha">
            <button class="btn btn-buy" onclick="confirmarAdm()">ENTRAR</button>
            <button class="btn btn-sec" style="margin-top:10px;" onclick="fecharModalAdm()">CANCELAR</button>
        </div>
    </div>

    <nav class="nav-bottom" id="nav-main">
        <div class="nav-item" onclick="showPage('page-shop')">🏠<br>Loja</div>
        <div class="nav-item" onclick="showPage('page-cart')">🛒<br>Carrinho</div>
        <div class="nav-item adm-only" style="display:none" onclick="showPage('page-post')">➕<br>Postar</div>
        <div class="nav-item" onclick="fazerLogout()">🚪<br>Sair</div>
    </nav>

    <script>
        // BANCO DE DATOS E ESTADO
        let dados = JSON.parse(localStorage.getItem('jefter_vFinal')) || { produtos: [], zap: "559992057452" };
        let carrinho = [];
        let catAtual = 'novos';
        let imagemBase64 = "";
        let itemSelecionado = null;

        // LÓGICA DE IMAGEM
        document.getElementById('post-file').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = () => imagemBase64 = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        });

        // NAVEGAÇÃO
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            window.scrollTo(0,0);
        }

        function entrarComo(tipo) {
            localStorage.setItem('perfil', tipo);
            document.getElementById('nav-main').style.display = 'flex';
            if(tipo === 'adm') {
                document.querySelectorAll('.adm-only').forEach(el => el.style.display = 'block');
            } else {
                document.querySelectorAll('.adm-only').forEach(el => el.style.display = 'none');
            }
            showPage('page-shop');
            renderizar();
        }

        function abrirModalAdm() { document.getElementById('modal-adm').style.display = 'flex'; }
        function fecharModalAdm() { document.getElementById('modal-adm').style.display = 'none'; }

        function confirmarAdm() {
            const u = document.getElementById('login-u').value;
            const p = document.getElementById('login-p').value;
            if(u === "jefter_28" && p === "Josue_2808") {
                fecharModalAdm();
                entrarComo('adm');
            } else {
                alert("Usuário ou Senha incorretos!");
            }
        }

        // PRODUTOS
        function salvarNovoMovel() {
            const nome = document.getElementById('post-nome').value;
            const preco = document.getElementById('post-preco').value;
            const cat = document.getElementById('post-cat').value;
            if(!nome || !preco || !imagemBase64) return alert("Preencha tudo e selecione a foto!");

            dados.produtos.push({ id: Date.now(), nome, preco, cat, img: imagemBase64 });
            localStorage.setItem('jefter_vFinal', JSON.stringify(dados));
            alert("Postado com sucesso!");
            showPage('page-shop');
            renderizar();
        }

        function renderizar() {
            const grid = document.getElementById('grid-produtos');
            const lista = dados.produtos.filter(p => p.cat === catAtual);
            grid.innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <div style="font-size:10px; color:gold; margin-top:5px;">⭐⭐⭐⭐⭐</div>
                    <div style="font-weight:bold; font-size:14px; margin:5px 0;">${p.nome}</div>
                    <div class="price">R$ ${p.preco}</div>
                    <button class="btn btn-buy" onclick="verDetalhes(${p.id})">COMPRAR</button>
                    ${localStorage.getItem('perfil') === 'adm' ? `<button onclick="apagar(${p.id})" style="background:red; color:white; border:none; border-radius:5px; margin-top:5px; padding:3px; width:100%; font-size:10px;">APAGAR</button>` : ''}
                </div>
            `).join('');
        }

        function filtrar(c) {
            catAtual = c;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-'+c).classList.add('active');
            renderizar();
        }

        // COMPRA E CARRINHO
        function verDetalhes(id) {
            itemSelecionado = dados.produtos.find(p => p.id === id);
            document.getElementById('view-nome').innerText = itemSelecionado.nome;
            document.getElementById('view-preco').innerText = "R$ " + itemSelecionado.preco;
            document.getElementById('view-img').src = itemSelecionado.img;
            showPage('page-details');
        }

        function adicionarAoCarrinho() {
            const cor = document.getElementById('view-cor').value;
            const qtd = document.getElementById('view-qtd').value;
            carrinho.push({ ...itemSelecionado, cor, qtd: parseInt(qtd) });
            atualizarBadge();
            alert("🛒 Adicionado ao Carrinho!");
            showPage('page-shop');
        }

        function atualizarBadge() {
            document.getElementById('cart-badge').innerText = carrinho.length;
            const lista = document.getElementById('lista-carrinho');
            let total = 0;
            lista.innerHTML = carrinho.map((item, index) => {
                const subtotal = parseFloat(item.preco.replace('.','').replace(',','.')) * item.qtd;
                total += subtotal;
                return `
                <div class="cart-item">
                    <img src="${item.img}">
                    <div style="flex:1">
                        <div style="font-weight:bold">${item.nome}</div>
                        <div style="font-size:12px; color:gray">Cor: ${item.cor} | Qtd: ${item.qtd}</div>
                    </div>
                    <div style="color:var(--neon)">R$ ${item.preco}</div>
                    <button onclick="removerItem(${index})" style="background:none; border:none; color:red; font-weight:bold">X</button>
                </div>`;
            }).join('');
            document.getElementById('total-carrinho').innerText = "Total: R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }

        function removerItem(i) { carrinho.splice(i, 1); atualizarBadge(); }

        function finalizarPedido() {
            if(carrinho.length === 0) return alert("O carrinho está vazio!");
            let msg = `Olá Jefter Móveis! Quero encomendar:\n\n`;
            carrinho.forEach(i => {
                msg += `🛋️ *${i.nome}*\n🎨 Cor: ${i.cor}\n🔢 Qtd: ${i.qtd}\n💰 Preço: R$ ${i.preco}\n\n`;
            });
            msg += `Estes itens estão disponíveis?`;
            window.open(`https://wa.me/${dados.zap}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function apagar(id) {
            dados.produtos = dados.produtos.filter(p => p.id !== id);
            localStorage.setItem('jefter_vFinal', JSON.stringify(dados));
            renderizar();
        }

        function fazerLogout() {
            localStorage.removeItem('perfil');
            location.reload();
        }
    </script>
</body>
</html>
