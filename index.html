<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefter Móveis - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #03060f;
            --card: #0d162d;
            --neon-blue: #00d2ff;
            --neon-purple: #9d4eff;
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .container {
            width: 90%; max-width: 380px;
            background: var(--card);
            padding: 35px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            display: none; /* Escondido inicial */
        }

        .logo-container {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(0,210,255,0.4);
        }

        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 16px; margin-bottom: 15px;
            border: none; border-radius: 18px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
            color: white; text-transform: uppercase;
        }

        .btn-client { background: linear-gradient(to right, #00c6ff, #0072ff); }
        .btn-admin { background: rgba(157, 78, 255, 0.1); border: 1px solid var(--neon-purple); }

        /* Loading Screen */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000;
        }

        .loader-bar {
            width: 200px; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-top: 20px; overflow: hidden;
        }

        .loader-fill {
            height: 100%; width: 0%;
            background: var(--neon-blue);
            transition: width 0.1s linear;
        }

        /* Inputs de Login */
        .input-box {
            width: 100%; padding: 15px; margin-bottom: 10px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: white; box-sizing: border-box;
        }

        #vitrine { width: 90%; max-width: 380px; display: none; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .card img { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="loading-screen" style="display:none;">
        <div class="logo-container">🛋️</div>
        <h2 id="load-txt">Entrando... 🚀</h2>
        <div class="loader-bar"><div class="loader-fill" id="fill"></div></div>
    </div>

    <div class="container" id="tela-home" style="display:block;">
        <div class="logo-container">🛋️</div>
        <h1>JEFTER MÓVEIS</h1>
        <p style="opacity:0.6; margin-bottom:30px;">Qualidade Premium para seu lar</p>
        
        <button class="btn btn-client" onclick="irPara('tela-cliente')">🛒 Fazer Login como Cliente</button>
        <button class="btn btn-admin" onclick="irPara('tela-admin')">🔐 Acesso Administrativo</button>
    </div>

    <div class="container" id="tela-cliente">
        <h2>Área do Cliente</h2>
        <input type="text" class="input-box" placeholder="Seu Nome">
        <button class="btn btn-client" onclick="entrar('cliente')">Entrar Agora</button>
        <p onclick="irPara('tela-home')" style="cursor:pointer; font-size:12px; opacity:0.5;">← Voltar</p>
    </div>

    <div class="container" id="tela-admin">
        <h2>Acesso ADM</h2>
        <input type="text" id="user" class="input-box" placeholder="Usuário">
        <input type="password" id="pass" class="input-box" placeholder="Senha">
        <button class="btn btn-admin" onclick="entrar('admin')">Entrar no Painel</button>
        <p onclick="irPara('tela-home')" style="cursor:pointer; font-size:12px; opacity:0.5;">← Voltar</p>
    </div>

    <div class="container" id="painel-post">
        <h3>Postar Novo Móvel</h3>
        <input type="text" id="p-nome" class="input-box" placeholder="Nome">
        <input type="text" id="p-preco" class="input-box" placeholder="Preço">
        <input type="text" id="p-img" class="input-box" placeholder="Link da Imagem">
        <button class="btn btn-client" onclick="postar()">Postar Produto</button>
        <button class="btn" style="background:red; font-size:10px;" onclick="localStorage.clear(); location.reload();">Sair</button>
    </div>

    <div id="vitrine"></div>

    <script>
        const ADM_U = "JEFFG";
        const ADM_P = "rrJEFTER.ADMrr";

        function irPara(id) {
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function entrar(tipo) {
            if(tipo === 'admin') {
                const u = document.getElementById('user').value;
                const p = document.getElementById('pass').value;
                if(u !== ADM_U || p !== ADM_P) return alert("Erro: Senha errada! ❌");
            }

            // Inicia Loading de 2.5s
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            const screen = document.getElementById('loading-screen');
            const fill = document.getElementById('fill');
            const txt = document.getElementById('load-txt');
            screen.style.display = 'flex';

            let width = 0;
            const msg = ["Entrando... 🚀", "Quase lá... 🛠️", "Validando... ✅", "Pronto! ✨"];
            
            const interval = setInterval(() => {
                width += 4;
                fill.style.width = width + '%';
                if(width == 20) txt.innerText = msg[1];
                if(width == 60) txt.innerText = msg[2];
                if(width == 90) txt.innerText = msg[3];

                if(width >= 100) {
                    clearInterval(interval);
                    screen.style.display = 'none';
                    if(tipo === 'admin') {
                        localStorage.setItem("adm", "true");
                        irPara('painel-post');
                    } else {
                        document.getElementById('vitrine').style.display = 'block';
                        render();
                    }
                }
            }, 100);
        }

        function postar() {
            const n = document.getElementById('p-nome').value;
            const p = document.getElementById('p-preco').value;
            const i = document.getElementById('p-img').value;
            let db = JSON.parse(localStorage.getItem("db")) || [];
            db.push({n, p, i});
            localStorage.setItem("db", JSON.stringify(db));
            alert("Postado! 🛋️");
            render();
        }

        function render() {
            const v = document.getElementById('vitrine');
            const db = JSON.parse(localStorage.getItem("db")) || [];
            v.innerHTML = db.map(item => `
                <div class="card">
                    <img src="${item.i}">
                    <h3>${item.n}</h3>
                    <p style="color:var(--neon-blue); font-weight:bold;">${item.p}</p>
                </div>
            `).join('');
        }

        window.onload = () => {
            if(localStorage.getItem("adm") === "true") {
                irPara('painel-post');
                document.getElementById('vitrine').style.display = 'block';
                render();
            }
        };
    </script>
</body>
</html>
