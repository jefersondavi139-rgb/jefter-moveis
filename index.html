<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEFTER MÓVEIS | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* INTERFACE 100% ORIGINAL (BASEADA NAS SUAS FOTOS) */
        :root {
            --bg-dark: #050a12;
            --blue-gradient: linear-gradient(135deg, #00c6ff, #0072ff);
            --card-color: #0d1626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* ESTILO DA TELA DE CARREGAMENTO (FOTO 1) */
        .logo-box { width: 110px; height: 110px; background: var(--blue-gradient); border-radius: 25px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; box-shadow: 0 0 20px rgba(0, 114, 255, 0.5); }
        .loading-title { font-size: 24px; font-weight: 800; color: #00c6ff; margin-bottom: 5px; text-transform: uppercase; }
        .status-text { color: #888; font-size: 14px; margin-bottom: 20px; }
        .progress-bg { width: 250px; height: 8px; background: #1a2636; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #0072ff; }

        /* ESTILO DO LOGIN (FOTO 2 E 3) */
        .login-card { background: var(--card-color); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #1c2530; }
        .input-group { background: #fff; border-radius: 15px; display: flex; align-items: center; margin-bottom: 15px; padding: 0 15px; }
        .input-group i { color: #0072ff; width: 20px; }
        .input-group input { width: 100%; padding: 15px; border: none; background: transparent; outline: none; color: #333; font-weight: bold; }
        .btn-blue { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #0072ff; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-purple { background: linear-gradient(to right, #6a11cb, #2575fc); margin-top: 10px; }

        /* ESTILO DO DASHBOARD (FOTO 5 E 6) */
        .header { width: 100%; padding: 15px; background: #0d1626; display: flex; justify-content: space-between; align-items: center; }
        .tabs { width: 100%; display: flex; background: #0d1626; border-bottom: 1px solid #1c2530; }
        .tab-item { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; color: #555; cursor: pointer; }
        .tab-item.active-tab { color: #00c6ff; border-bottom: 2px solid #00c6ff; }
        
        /* MENU INFERIOR ORIGINAL */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0d1626; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1c2530; }
        .nav-link { color: #555; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link.active-nav { color: #00c6ff; }
        .btn-plus { background: #56ccf2; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; margin-top: -25px; border: 4px solid var(--bg-dark); }
    </style>
</head>
<body>

    <div id="scr-loading" class="screen active">
        <div class="logo-box"><i class="fas fa-couch" style="font-size: 50px; color: white;"></i></div>
        <div class="loading-title">JEFTER MÓVEIS</div>
        <div class="status-text">Olá, Jsjsj! 👋</div>
        <div class="status-text" style="margin-top: -15px; font-size: 12px;">Quase lá... 🚀</div>
        <div class="progress-bg"><div id="bar" class="progress-bar"></div></div>
        <div id="perc" style="margin-top: 10px; color: #0072ff; font-size: 12px;">0%</div>
    </div>

    <div id="scr-login" class="screen">
        <div class="login-card">
            <i class="fas fa-user-shield" style="font-size: 50px; color: #ffd700; margin-bottom: 15px;"></i>
            <h2 style="margin-bottom: 20px;">Área Restrita</h2>
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="user" placeholder="Usuário"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="pass" placeholder="Senha"></div>
            <button class="btn-blue btn-purple" onclick="logar()">🚀 Entrar como Admin</button>
            <p onclick="ir('scr-loading')" style="margin-top: 20px; color: #555; font-size: 12px; cursor: pointer;">← Voltar</p>
        </div>
    </div>

    <div id="scr-site" class="screen" style="justify-content: flex-start;">
        <div class="header">
            <div style="display: flex; align-items: center;"><div style="width:30px; height:30px; background:#0072ff; border-radius:5px; margin-right:10px; display:flex; align-items:center; justify-content:center; font-weight:bold;">J</div> JEFTER MÓVEIS</div>
            <button onclick="location.reload()" style="background:#1c2530; border:none; color:white; padding:5px 10px; border-radius:5px; font-size:12px;">Sair</button>
        </div>
        <div class="tabs">
            <div class="tab-item active-tab">✨ NOVOS</div>
            <div class="tab-item">SEMINOVOS</div>
            <div class="tab-item">USADOS</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#555;">
            <i class="fas fa-box-open" style="font-size:50px; margin-bottom:15px;"></i>
            <p>Nenhum produto cadastrado.</p>
        </div>
        <div class="bottom-nav">
            <div class="nav-link active-nav"><i class="fas fa-couch"></i>Produtos</div>
            <div class="nav-link"><i class="fas fa-chart-line"></i>Vendas</div>
            <div class="btn-plus"><i class="fas fa-plus"></i></div>
            <div class="nav-link"><i class="fas fa-cog"></i>Config</div>
            <div class="nav-link" onclick="ir('scr-login')"><i class="fas fa-user-lock"></i>Admin</div>
        </div>
    </div>

    <script>
        // CORREÇÃO: BARRA DE 100% QUE ENTRA NO SITE
        let p = 0;
        const load = setInterval(() => {
            p++;
            document.getElementById('bar').style.width = p + "%";
            document.getElementById('perc').innerText = p + "%";
            if(p >= 100) {
                clearInterval(load);
                setTimeout(() => ir('scr-site'), 500);
            }
        }, 30);

        function ir(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function logar() {
            const u = document.getElementById('user').value;
            const s = document.getElementById('pass').value;
            if(u === "JEFFG" && s === "rrJEFTER.ADMrr") {
                alert("Acesso Confirmado!");
                ir('scr-site');
            } else {
                alert("Senha Incorreta!");
            }
        }
    </script>
</body>
</html>
