<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefter Móveis - Loja Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03060f;
            --card: #0d162d;
            --neon-blue: #00d2ff;
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            width: 90%; max-width: 380px;
            background: var(--card);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .logo-box {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(0,168,255,0.4);
        }

        h1 { font-size: 24px; margin: 0 0 10px 0; }
        .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 25px; }

        .stats {
            background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 12px;
            margin-bottom: 25px; font-size: 13px;
        }

        .btn {
            display: block; width: 100%;
            padding: 15px; margin-bottom: 12px;
            border: none; border-radius: 15px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
            color: white; text-decoration: none;
            box-sizing: border-box;
        }

        .btn-client { background: linear-gradient(to right, #00a8ff, #0066ff); }
        .btn-admin { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: scale(1.02); }

        /* Painel ADM */
        #panel-adm {
            display: none;
            margin-top: 20px; background: rgba(0,0,0,0.3);
            padding: 20px; border-radius: 15px;
            border: 1px dashed var(--neon-blue);
        }

        input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: #050a18; color: white; box-sizing: border-box;
        }

        /* Vitrine de Produtos */
        .vitrine {
            width: 90%; max-width: 380px;
            display: grid; grid-template-columns: 1fr; gap: 15px;
        }

        .card-produto {
            background: var(--card);
            border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }

        .card-produto img {
            width: 100%; border-radius: 15px;
            height: 200px; object-fit: cover; margin-bottom: 10px;
        }

        .card-produto h3 { margin: 0; font-size: 18px; }
        .card-produto p { color: var(--neon-blue); font-weight: bold; margin: 5px 0 0 0; }

        .footer {
            margin-top: 40px; text-align: center;
            font-size: 12px; opacity: 0.5; padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">🛋️</div>
        <h1>JEFTER MÓVEIS</h1>
        <p class="subtitle">Móveis de alta qualidade para sua casa.</p>

        <div class="stats">
            👥 <span>2</span> clientes já entraram
        </div>

        <button class="btn btn-client" onclick="document.getElementById('vitrine-area').scrollIntoView({behavior: 'smooth'})">🛒 Ver Catálogo</button>
        <button class="btn btn-admin" id="btn-login" onclick="fazerLogin()">🔐 Acesso Administrativo</button>
        <button class="btn btn-admin" id="btn-sair" style="display:none;" onclick="fazerLogout()">🚪 Sair da Conta</button>

        <div id="panel-adm">
            <h3 style="margin-top:0;">Postar Móvel</h3>
            <input type="text" id="p-nome" placeholder="Nome do Móvel">
            <input type="text" id="p-preco" placeholder="Preço (Ex: R$ 500)">
            <input type="text" id="p-img" placeholder="Link da Foto">
            <button class="btn btn-client" onclick="salvarProduto()">Postar Agora</button>
        </div>
    </div>

    <div class="vitrine" id="vitrine-area">
        </div>

    <div class="footer">
        <p>Suporte: (99) 9205-7452</p>
        <p>Jefter Móveis © 2026</p>
    </div>

    <script>
        const ADM_USER = "JEFFG";
        const ADM_PASS = "rrJEFTER.ADMrr";

        function inicializar() {
            if (localStorage.getItem("logado") === "true") {
                document.getElementById("panel-adm").style.display = "block";
                document.getElementById("btn-login").style.display = "none";
                document.getElementById("btn-sair").style.display = "block";
            }
            renderizarVitrine();
        }

        function fazerLogin() {
            const u = prompt("Usuário:");
            const s = prompt("Senha:");
            if (u === ADM_USER && s === ADM_PASS) {
                localStorage.setItem("logado", "true");
                location.reload();
            } else {
                alert("Login ou Senha incorretos!");
            }
        }

        function fazerLogout() {
            localStorage.removeItem("logado");
            location.reload();
        }

        function salvarProduto() {
            const nome = document.getElementById("p-nome").value;
            const preco = document.getElementById("p-preco").value;
            const img = document.getElementById("p-img").value;

            if(!nome || !preco || !img) return alert("Preencha todos os campos!");

            let estoque = JSON.parse(localStorage.
