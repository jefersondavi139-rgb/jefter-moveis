<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEFTER MÓVEIS | V15 FULL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2b04a;
            --gold-dark: #b38b2d;
            --bg: #000000;
            --card: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; height: 100vh; overflow: hidden; }

        /* ENGINE DE TELAS (ANTI-REFRESH) */
        .screen { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); overflow-y: auto; padding-bottom: 100px; }
        .screen-active { display: flex !important; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* TELA INICIAL CENTRALIZADA */
        #sc-intro { align-items: center; justify-content: center; text-align: center; }
        .logo-box { margin-bottom: 50px; }
        .logo-box h1 { font-family: 'Cinzel', serif; font-size: 42px; color: var(--gold); letter-spacing: 5px; text-shadow: 0 0 30px rgba(226,176,74,0.3); }
        
        .btn-ux {
            width: 85%; max-width: 320px; padding: 22px; border: none; border-radius: 15px;
            font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 13px; margin: 8px auto;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #000; }
        .btn-dark { background: #080808; color: #fff; border: 1px solid #222; }

        /* LOJA E CATEGORIAS */
        header { padding: 20px; text-align: center; border-bottom: 1px solid #111; font-family: 'Cinzel'; color: var(--gold); font-size: 20px; }
        .tabs { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 10px 20px; background: #080808; border-radius: 50px; font-size: 11px; white-space: nowrap; color: #555; border: 1px solid transparent; }
        .tab.active { color: var(--gold); border-color: var(--gold); background: rgba(226,176,74,0.05); }

        .shelf { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .product-card { background: var(--card); border-radius: 20px; padding: 10px; border: 1px solid #111; }
        .product-card img { width: 100%; height: 150px; border-radius: 15px; object-fit: cover; }

        /* CARRINHO E FORMULÁRIOS */
        input, select { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; background: #000; border: 1px solid #222; color: #fff; outline: none; }
        .cart-item { display: flex; align-items: center; background: #080808; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #111; }

        /* NAVBAR FLUTUANTE */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 70px; background: rgba(10,10,10,0.9); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid #222; display: none; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-icon { font-size: 22px; cursor: pointer; color: #333; transition: 0.3s; }
        .nav-icon.active { color: var(--gold); }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: #050505; padding: 30px; border-radius: 25px; width: 90%; max-width: 350px; border: 1px solid var(--gold); text-align: center; }
    </style>
</head>
<body>

    <div id="sc-intro" class="screen screen-active">
        <div class="logo-box">
            <h1>JEFTER</h1>
            <p style="letter-spacing: 5px; color: #444; font-size: 10px; text-transform: uppercase;">Móveis de Luxo</p>
        </div>
        <button class="btn-ux btn-gold" onclick="App.start('client', event)">🛋️ LOGAR COMO CLIENTE</button>
        <button class="btn-ux btn-dark" onclick="App.toggleM(true, event)">🔑 ACESSO DO DONO</button>
    </div>

    <div id="sc-shop" class="screen">
        <header>GALERIA JM</header>
        <div class="tabs">
            <div class="tab active" id="t-novos" onclick="App.filter('novos')">NOVOS</div>
            <div class="tab" id="t-usados" onclick="App.filter('usados')">USADOS</div>
            <div class="tab" id="t-seminovos" onclick="App.filter('seminovos')">SEMI-NOVOS</div>
        </div>
        <div id="shelf" class="shelf"></div>
    </div>

    <div id="sc-post" class="screen" style="padding: 25px;">
        <h2 style="color:var(--gold); font-family:'Cinzel'; margin-bottom:20px;">POSTAR MÓVEL</h2>
        <input type="text" id="p-title" placeholder="Nome do Móvel">
        <input type="text" id="p-price" placeholder="Preço (Ex: 1.200)">
        <select id="p-cat">
            <option value="novos">Novos</option>
            <option value="usados">Usados</option>
            <option value="seminovos">Semi-Novos</option>
        </select>
        <input type="file" id="p-file" accept="image/*">
        <button class="btn-ux btn-gold" style="width:100%" onclick="App.save(event)">🚀 PUBLICAR AGORA</button>
    </div>

    <div id="sc-cart" class="screen" style="padding: 25px;">
        <h2 style="font-family:'Cinzel'; margin-bottom:20px;">MEU INTERESSE</h2>
        <div id="cart-list"></div>
        <div id="cart-total" style="font-size:24px; color:var(--gold); margin: 25px 0;">Total: R$ 0,00</div>
        <button class="btn-ux btn-gold" style="width:100%" onclick="App.zap()">✅ CHAMAR NO WHATSAPP</button>
    </div>

    <div id="m-login" class="modal">
        <div class="modal-box">
            <h3 style="color:var(--gold); margin-bottom:20px;">SISTEMA INTERNO</h3>
            <input type="text" id="l-u" placeholder="Usuário">
            <input type="password" id="l-p" placeholder="Senha">
            <button class="btn-ux btn-gold" style="width:100%" onclick="App.login(event)">ENTRAR</button>
            <p onclick="App.toggleM(false, event)" style="margin-top:15px; color:#444; font-size:11px; cursor:pointer;">CANCELAR</p>
        </div>
    </div>

    <nav id="navbar">
        <div class="nav-icon active" onclick="App.go('sc-shop', event)">🏠</div>
        <div class="nav-icon" onclick="App.go('sc-cart', event)">🛒 <span id="cart-count" style="font-size:10px; color:var(--gold)">0</span></div>
        <div id="nv-adm" class="nav-icon" style="display:none" onclick="App.go('sc-post', event)">➕</div>
        <div class="nav-icon" onclick="location.reload()">🚪</div>
    </nav>

    <script>
        const App = {
            db: JSON.parse(localStorage.getItem('J_M_FINAL')) || { items: [] },
            cart: [],
            currentCat: 'novos',
            tempImg: "",

            go: (id, e) => {
                if(e) e.preventDefault();
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
                document.getElementById(id).classList.add('screen-active');
                document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            },

            start: (role, e) => {
                if(e) e.preventDefault();
                document.getElementById('navbar').style.display = 'flex';
                if(role === 'adm') document.getElementById('nv-adm').style.display = 'block';
                App.go('sc-shop');
                App.render();
            },

            toggleM: (s, e) => { if(e) e.preventDefault(); document.getElementById('m-login').style.display = s ? 'flex' : 'none'; },

            login: (e) => {
                if(e) e.preventDefault();
                if(document.getElementById('l-u').value === "jefter_28" && document.getElementById('l-p').value === "Josue_2808") {
                    App.toggleM(false); App.start('adm');
                }
            },

            filter: (c) => {
                App.currentCat = c;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.getElementById('t-'+c).classList.add('active');
                App.render();
            },

            render: () => {
                const shelf = document.getElementById('shelf');
                const list = App.db.items.filter(i => i.cat === App.currentCat);
                if(list.length === 0) { shelf.innerHTML = '<p style="grid-column:span 2; text-align:center; color:#222; margin-top:40px;">Vazio</p>'; return; }
                
                shelf.innerHTML = list.map(i => `
                    <div class="product-card">
                        <img src="${i.img}">
                        <div style="font-size:11px; margin:8px 0;">${i.title}</div>
                        <div style="color:var(--gold); font-weight:600; font-size:14px; display:flex; justify-content:space-between;">
                            R$ ${i.price}
                            <span onclick="App.add(${i.id})" style="cursor:pointer; color:#fff;">⊕</span>
                        </div>
                        ${document.getElementById('nv-adm').style.display === 'block' ? `<button onclick="App.del(${i.id})" style="background:none; border:none; color:red; font-size:9px; width:100%; margin-top:8px;">Excluir</button>` : ''}
                    </div>
                `).join('');
            },

            save: (e) => {
                if(e) e.preventDefault();
                const title = document.getElementById('p-title').value;
                const price = document.getElementById('p-price').value;
                const cat = document.getElementById('p-cat').value;
                if(!title || !App.tempImg) return;
                App.db.items.push({ id: Date.now(), title, price, cat, img: App.tempImg });
                localStorage.setItem('J_M_FINAL', JSON.stringify(App.db));
                App.go('sc-shop'); App.render();
            },

            add: (id) => {
                App.cart.push(App.db.items.find(i => i.id === id));
                document.getElementById('cart-count').innerText = App.cart.length;
                App.updateCart();
                App.go('sc-cart');
            },

            updateCart: () => {
                const box = document.getElementById('cart-list');
                let total = 0;
                box.innerHTML = App.cart.map((i, idx) => {
                    total += parseFloat(i.price.replace('.','').replace(',','.'));
                    return `<div class="cart-item">
                        <img src="${i.img}" style="width:50px; height:50px; border-radius:10px; margin-right:15px; object-fit:cover;">
                        <div style="flex:1; font-size:13px;">${i.title}</div>
                        <div style="color:var(--gold)">R$ ${i.price}</div>
                    </div>`;
                }).join('');
                document.getElementById('cart-total').innerText = "Total: R$ " + total.toLocaleString('pt-BR');
            },

            zap: () => {
                let m = "Olá Jefter Móveis! Tenho interesse nesses itens:\n" + App.cart.map(i => `- ${i.title}`).join("\n");
                window.open(`https://wa.me/559992057452?text=${encodeURIComponent(m)}`);
            },

            del: (id) => {
                App.db.items = App.db.items.filter(i => i.id !== id);
                localStorage.setItem('J_M_FINAL', JSON.stringify(App.db));
                App.render();
            }
        };

        document.getElementById('p-file').addEventListener('change', (e) => {
            const r = new FileReader(); r.onload = () => App.tempImg = r.result; r.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
