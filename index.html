<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEFTER MÓVEIS | O LUXO DA SUA CASA 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --blue: #0062ff;
            --dark: #010307;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Poppins', sans-serif; overflow: hidden;
        }

        /* ANIMAÇÕES EXTREMAS */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        @keyframes glowText { 0% { text-shadow: 0 0 10px var(--neon); } 50% { text-shadow: 0 0 30px var(--neon), 0 0 50px var(--blue); } 100% { text-shadow: 0 0 10px var(--neon); } }

        /* TELA DE CARREGAMENTO ULTRA ANIMADA */
        #loader {
            position: fixed; top: 0; width: 100%; height: 100%; background: var(--dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000;
            transition: 1s ease-out;
        }
        .loading-circle {
            width: 120px; height: 120px; border: 4px solid #111;
            border-top: 4px solid var(--neon); border-radius: 50%;
            animation: spin 1s linear infinite; box-shadow: 0 0 20px var(--neon);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text { margin-top: 30px; font-family: 'Orbitron'; color: var(--neon); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        /* SISTEMA DE PÁGINAS */
        .page { display: none; height: 100vh; width: 100%; animation: fadeIn 0.8s forwards; }
        .active-page { display: flex !important; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* TELA DE LOGIN / ESCOLHA */
        .entry-container { background: radial-gradient(circle, #001a33, var(--dark)); align-items: center; justify-content: center; text-align: center; }
        .logo-box { animation: float 4s infinite ease-in-out; margin-bottom: 40px; }
        .logo-text { font-family: 'Orbitron'; font-size: 45px; animation: glowText 2s infinite; }
        
        .choice-btn {
            width: 300px; padding: 20px; margin: 10px; border: none; border-radius: 50px;
            font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; font-family: 'Orbitron';
        }
        .btn-client { background: linear-gradient(90deg, var(--blue), var(--neon)); color: white; box-shadow: 0 10px 30px rgba(0, 98, 255, 0.4); }
        .btn-adm { background: transparent; border: 2px solid var(--neon); color: var(--neon); }
        .choice-btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 0 50px var(--neon); }

        /* INTERFACE DA LOJA */
        header { padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        .tab-bar { display: flex; background: #050a14; }
        .tab { flex: 1; padding: 20px; text-align: center; cursor: pointer; font-weight: bold; border-bottom: 3px solid transparent; color: #444; transition: 0.3s; }
        .tab.active { color: var(--neon); border-bottom-color: var(--neon); background: rgba(0,242,255,0.05); }

        /* GRID DE MÓVEIS */
        .shelf { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding-bottom: 100px; }
        .card { background: var(--glass); border-radius: 30px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .card:hover { border-color: var(--neon); }
        .card img { width: 100%; height: 180px; background: #000; border-radius: 20px; object-fit: cover; }
        .price { font-size: 24px; color: var(--neon); font-family: 'Orbitron'; margin: 15px 0; }

        /* MENU ADM SECRETO NO RODAPÉ */
        #admin-menu { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.95); display: none; justify-content: space-around; align-items: center; border-top: 2px solid var(--neon); }
        .add-icon { width: 60px; height: 60px; background: var(--neon); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: black; font-size: 30px; margin-top: -40px; box-shadow: 0 0 20px var(--neon); cursor: pointer; }

        /* FORMULÁRIOS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .modal-content { background: #0a0f1a; padding: 30px; border-radius: 30px; border: 1px solid var(--blue); width: 90%; max-width: 400px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #222; background: #000; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-circle"></div>
        <div id="loading-text">Iniciando Sistema...</div>
    </div>

    <div id="page-login" class="page active-page entry-container">
        <div class="logo-box">
            <div class="logo-text">JEFTER MÓVEIS</div>
            <p style="color: #666; letter-spacing: 5px;">EXCLUSIVE STORE</p>
        </div>
        <button class="choice-btn btn-client" onclick="fazerLogin('cliente')">👤 Entrar como Cliente</button>
        <button class="choice-btn btn-adm" onclick="mostrarModalLoginAdm()">🔐 Painel do Dono</button>
        <p style="margin-top: 40px; font-size: 10px; color: #333;">QUALIDADE QUE TRANSFORMA SEU LAR</p>
    </div>

    <div id="page-shop" class="page">
        <header>
            <div style="font-family: 'Orbitron'; font-weight: 900; color: var(--neon);">J MÓVEIS</div>
            <div style="font-size: 11px; color: var(--neon); font-family: 'Orbitron';">👤 <span id="online-count">1450</span> ONLINE</div>
        </header>

        <div class="tab-bar">
            <div class="tab active" id="t-novos" onclick="mudarCat('novos')">NOVOS</div>
            <div class="tab" id="t-usados" onclick="mudarCat('usados')">USADOS</div>
            <div class="tab" id="t-seminovos" onclick="mudarCat('seminovos')">SEMI-NOVOS</div>
        </div>

        <div class="shelf" id="prateleira"></div>

        <div id="admin-menu">
            <div onclick="abrirConfig()" style="cursor:pointer">⚙️ CONFIG</div>
            <div class="add-icon" onclick="abrirPostar()">+</div>
            <div onclick="fazerLogout()" style="cursor:pointer">🚪 SAIR</div>
        </div>
    </div>

    <div id="modal-adm" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--neon); font-family: 'Orbitron';">ACESSO ADM</h2>
            <input type="text" id="adm-u" placeholder="Usuário">
            <input type="password" id="adm-p" placeholder="Senha">
            <button class="choice-btn btn-client" style="width:100%" onclick="validarAdm()">ENTRAR</button>
            <button onclick="fecharModais()" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer">Voltar</button>
        </div>
    </div>

    <div id="modal-post" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon)">POSTAR NOVO MÓVEL</h3>
            <input type="text" id="post-nome" placeholder="Nome do Móvel">
            <input type="text" id="post-preco" placeholder="Valor (R$)">
            <select id="post-cat">
                <option value="novos">Novos</option>
                <option value="usados">Usados</option>
                <option value="seminovos">Semi-Novos</option>
            </select>
            <button class="choice-btn btn-client" style="width:100%" onclick="salvarPost()">PUBLICAR ✅</button>
            <button onclick="fecharModais()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon)">CONFIGURAÇÕES</h3>
            <label style="font-size:12px; color:gray">Número Online:</label>
            <input type="text" id="conf-online">
            <label style="font-size:12px; color:gray">WhatsApp Suporte:</label>
            <input type="text" id="conf-zap">
            <button class="choice-btn btn-client" style="width:100%" onclick="salvarConfig()">SALVAR 💾</button>
            <button onclick="fecharModais()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Voltar</button>
        </div>
    </div>

    <script>
        // BANCO DE DADOS
        let db = JSON.parse(localStorage.getItem('jefter_v4')) || {
            online: "1.450",
            zap: "(99) 9205-7452",
            moveis: []
        };

        const frases = [
            "Construindo sonhos...",
            "Qualidade que você confia!",
            "O melhor para sua casa está aqui.",
            "JEFTER MÓVEIS: Seu lar, nosso compromisso.",
            "Sincronizando ofertas exclusivas..."
        ];

        let catAtual = 'novos';

        // CARREGAMENTO INICIAL
        window.onload = () => {
            const txt = document.getElementById('loading-text');
            txt.innerText = frases[Math.floor(Math.random() * frases.length)];

            setTimeout(() => {
                document.getElementById('loader').style.transform = 'translateY(-100%)';
                // IMPORTANTE: Removi o auto-login para você SEMPRE escolher ao abrir
                document.getElementById('page-login').classList.add('active-page');
            }, 3000);
        };

        function mudarPagina(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        }

        function fazerLogin(tipo) {
            sessionStorage.setItem('perfil', tipo);
            mudarPagina('page-shop');
            if(tipo === 'adm') document.getElementById('admin-menu').style.display = 'flex';
            atualizarTela();
        }

        function mostrarModalLoginAdm() { document.getElementById('modal-adm').style.display = 'flex'; }
        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function validarAdm() {
            const u = document.getElementById('adm-u').value;
            const p = document.getElementById('adm-p').value;
            if(u === "jefter_28" && p === "Josue_2808") {
                fecharModais();
                fazerLogin('adm');
            } else { alert("ACESSO NEGADO!"); }
        }

        function abrirPostar() { document.getElementById('modal-post').style.display = 'flex'; }
        function abrirConfig() { 
            document.getElementById('conf-online').value = db.online;
            document.getElementById('conf-zap').value = db.zap;
            document.getElementById('modal-config').style.display = 'flex'; 
        }

        function mudarCat(c) {
            catAtual = c;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-'+c).classList.add('active');
            atualizarTela();
        }

        function salvarPost() {
            const nome = document.getElementById('post-nome').value;
            const preco = document.getElementById('post-preco').value;
            const cat = document.getElementById('post-cat').value;
            if(nome && preco) {
                db.moveis.push({ nome, preco, cat, id: Date.now() });
                salvarDB();
                fecharModais();
                atualizarTela();
            }
        }

        function salvarConfig() {
            db.online = document.getElementById('conf-online').value;
            db.zap = document.getElementById('conf-zap').value;
            salvarDB();
            fecharModais();
            atualizarTela();
        }

        function salvarDB() { localStorage.setItem('jefter_v4', JSON.stringify(db)); }

        function atualizarTela() {
            const shelf = document.getElementById('prateleira');
            const lista = db.moveis.filter(m => m.cat === catAtual);
            document.getElementById('online-count').innerText = db.online;

            if(lista.length === 0) {
                shelf.innerHTML = `<p style="text-align:center; grid-column:1/-1; color:#222; padding:50px">Aguardando novos produtos...</p>`;
                return;
            }

            shelf.innerHTML = lista.map(m => `
                <div class="card">
                    <div style="height:180px; background:#000; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:40px;">🛋️</div>
                    <div style="color:var(--gold); font-size:12px; margin-top:10px;">⭐⭐⭐⭐⭐</div>
                    <h3 style="margin:5px 0;">${m.nome}</h3>
                    <div class="price">R$ ${m.preco}</div>
                    <button class="choice-btn btn-client" style="width:100%; padding:12px; font-size:12px;" onclick="alert('Fale conosco: ' + db.zap)">COMPRAR AGORA</button>
                    ${sessionStorage.getItem('perfil') === 'adm' ? `<button onclick="apagar('${m.id}')" style="background:red; color:white; border:none; margin-top:10px; width:100%; border-radius:5px; padding:5px; font-size:10px;">APAGAR</button>` : ''}
                </div>
            `).join('');
        }

        function apagar(id) {
            db.moveis = db.moveis.filter(m => m.id != id);
            salvarDB();
            atualizarTela();
        }

        function fazerLogout() {
            sessionStorage.clear();
            location.reload();
        }
    </script>
</body>
    </html>
