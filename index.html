<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEFTER MÓVEIS | LUXURY EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --primary: #8b5cf6; /* Roxo Neon */
            --secondary: #06b6d4; /* Azul Elétrico */
            --accent: #f472b6; /* Rosa Shock */
            --glass: rgba(255, 255, 255, 0.03);
            --card-bg: #0a0a0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* SISTEMA DE TELAS */
        .view { 
            display: none; 
            height: 100vh; 
            width: 100%; 
            overflow-y: auto; 
            padding-bottom: 90px; 
            position: absolute;
            background: var(--bg);
        }
        .view-active { display: block; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TELA DE ENTRADA (SPLASH) */
        #view-intro { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle at center, #1e1b4b 0%, #020205 100%);
            z-index: 9999;
        }

        .logo-main {
            font-family: 'Syncopate', sans-serif;
            font-size: 32px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-align: center;
        }

        /* BOTÕES ESTILIZADOS */
        .btn-main {
            width: 85%;
            max-width: 300px;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-client { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-adm { background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        /* CABEÇALHO */
        header { 
            padding: 20px; 
            background: rgba(2, 2, 5, 0.8); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* VITRINE */
        .tabs { display: flex; padding: 10px; gap: 10px; background: #050508; }
        .tab { 
            flex: 1; padding: 12px; text-align: center; border-radius: 12px; 
            font-size: 11px; font-weight: 600; color: #444; cursor: pointer;
        }
        .tab.active { background: var(--glass); color: var(--secondary); border: 1px solid var(--secondary); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .product-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 10px; 
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }
        .product-card img { width: 100%; height: 160px; border-radius: 15px; object-fit: cover; }
        .product-price { color: var(--secondary); font-weight: 700; margin: 8px 0; font-size: 18px; }

        /* MENU INFERIOR */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(10, 10, 15, 0.95); 
            backdrop-filter: blur(15px);
            display: none; justify-content: space-around; align-items: center; 
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }
        .nav-link { color: #555; text-align: center; font-size: 10px; cursor: pointer; text-decoration: none; }
        .nav-link.active { color: var(--primary); }

        /* MODAL DE LOGIN */
        .modal { 
            position: fixed; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-box { 
            background: #0f0f15; padding: 30px; border-radius: 24px; 
            width: 90%; max-width: 360px; border: 1px solid var(--primary);
        }
        input, select { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; 
            border: 1px solid #1a1a25; background: #050508; color: #fff; outline: none;
        }
    </style>
</head>
<body>

    <div id="view-intro" class="view view-active">
        <div class="logo-main">JEFTER<br>MÓVEIS</div>
        <button class="btn-main btn-client" onclick="Core.init('cliente')">Explorar Loja</button>
        <button class="btn-main btn-adm" onclick="Core.toggleModal(true)">Acesso Administrativo</button>
    </div>

    <div id="view-shop" class="view">
        <header>
            <div style="font-family:'Syncopate'; font-size:14px;">J MÓVEIS</div>
            <div onclick="Core.go('view-cart')" style="cursor:pointer">🛒 <span id="cart-dot" style="color:var(--accent)">0</span></div>
        </header>
        <div class="tabs">
            <div class="tab active" id="tab-novos" onclick="Core.filter('novos')">NOVOS</div>
            <div class="tab" id="tab-usados" onclick="Core.filter('usados')">USADOS</div>
            <div class="tab" id="tab-seminovos" onclick="Core.filter('seminovos')">SEMI-NOVOS</div>
        </div>
        <div id="shelf" class="grid"></div>
    </div>

    <div id="view-admin" class="view">
        <div style="padding: 30px;">
            <h2 style="color:var(--primary); margin-bottom: 20px;">NOVO PRODUTO</h2>
            <input type="text" id="p-title" placeholder="Nome do Móvel">
            <input type="text" id="p-price" placeholder="Preço (Ex: 2.400)">
            <select id="p-cat">
                <option value="novos">Novos</option>
                <option value="usados">Usados</option>
                <option value="seminovos">Semi-Novos</option>
            </select>
            <input type="file" id="p-file" accept="image/*" style="border:none; background:none;">
            <button class="btn-main btn-client" onclick="Core.upload()">Publicar no Site</button>
        </div>
    </div>

    <div id="view-cart" class="view">
        <div style="padding: 25px;">
            <h2>MEU PEDIDO</h2>
            <div id="cart-list" style="margin-top:20px;"></div>
            <div id="cart-total" style="font-size:24px; color:var(--secondary); margin: 30px 0;">Total: R$ 0,00</div>
            <button class="btn-main btn-client" style="width:100%" onclick="Core.checkout()">Enviar para o WhatsApp</button>
            <button class="btn-main btn-adm" style="width:100%" onclick="Core.go('view-shop')">Voltar à Loja</button>
        </div>
    </div>

    <div id="modal-login" class="modal">
        <div class="modal-box">
            <h3 style="text-align:center; margin-bottom:20px;">SISTEMA INTERNO</h3>
            <div id="log-err" style="color:red; font-size:12px; text-align:center; display:none;">Credenciais Inválidas</div>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-main btn-client" style="width:100%" onclick="Core.auth()">Acessar Painel</button>
            <button class="btn-main btn-adm" style="width:100%" onclick="Core.toggleModal(false)">Voltar</button>
        </div>
    </div>

    <nav class="bottom-nav" id="nav-bar">
        <div class="nav-link" onclick="Core.go('view-shop')">🏠<br>Início</div>
        <div class="nav-link" onclick="Core.go('view-cart')">🛒<br>Carrinho</div>
        <div id="nav-adm-link" class="nav-link" style="display:none" onclick="Core.go('view-admin')">➕<br>Postar</div>
        <div class="nav-link" onclick="location.reload()">🚪<br>Sair</div>
    </nav>

    <script>
        const Core = {
            data: JSON.parse(localStorage.getItem('J_FINAL_V10')) || { items: [] },
            cart: [],
            cat: 'novos',
            tempImg: "",

            init: (role) => {
                document.getElementById('nav-bar').style.display = 'flex';
                if(role === 'adm') document.getElementById('nav-adm-link').style.display = 'block';
                Core.go('view-shop');
                Core.render();
            },

            go: (id) => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
                document.getElementById(id).classList.add('view-active');
                window.scrollTo(0,0);
            },

            toggleModal: (show) => { document.getElementById('modal-login').style.display = show ? 'flex' : 'none'; },

            auth: () => {
                const u = document.getElementById('user').value;
                const p = document.getElementById('pass').value;
                if(u === "jefter_28" && p === "Josue_2808") {
                    Core.toggleModal(false); Core.init('adm');
                } else {
                    document.getElementById('log-err').style.display = 'block';
                }
            },

            filter: (c) => {
                Core.cat = c;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.getElementById('tab-'+c).classList.add('active');
                Core.render();
            },

            render: () => {
                const shelf = document.getElementById('shelf');
                const list = Core.data.items.filter(i => i.cat === Core.cat);
                shelf.innerHTML = list.map(i => `
                    <div class="product-card">
                        <img src="${i.img}">
                        <div style="font-size:12px; font-weight:600; margin-top:10px;">${i.title}</div>
                        <div class="product-price">R$ ${i.price}</div>
                        <button class="btn-main btn-client" style="padding:10px; font-size:10px; width:100%;" onclick="Core.addCart(${i.id})">COMPRAR</button>
                        ${document.getElementById('nav-adm-link').style.display === 'block' ? `<button onclick="Core.del(${i.id})" style="background:none; border:none; color:red; font-size:9px; width:100%; margin-top:8px;">Remover</button>` : ''}
                    </div>
                `).join('');
            },

            upload: () => {
                const t = document.getElementById('p-title').value;
                const p = document.getElementById('p-price').value;
                const c = document.getElementById('p-cat').value;
                if(!t || !Core.tempImg) return;

                Core.data.items.push({ id: Date.now(), title: t, price: p, cat: c, img: Core.tempImg });
                localStorage.setItem('J_FINAL_V10', JSON.stringify(Core.data));
                Core.go('view-shop'); Core.render();
            },

            addCart: (id) => {
                const item = Core.data.items.find(i => i.id === id);
                Core.cart.push(item);
                document.getElementById('cart-dot').innerText = Core.cart.length;
                Core.updateCartUI();
                Core.go('view-cart');
            },

            updateCartUI: () => {
                const list = document.getElementById('cart-list');
                let total = 0;
                list.innerHTML = Core.cart.map((i, idx) => {
                    total += parseFloat(i.price.replace('.','').replace(',','.'));
                    return `<div style="display:flex; background:var(--glass); padding:15px; border-radius:15px; margin-bottom:10px; align-items:center;">
                        <img src="${i.img}" style="width:40px; height:40px; border-radius:8px; margin-right:15px;">
                        <div style="flex:1; font-size:13px;">${i.title}</div>
                        <div style="color:var(--secondary)">R$ ${i.price}</div>
                        <button onclick="Core.remCart(${idx})" style="background:none; border:none; color:white; margin-left:15px;">✕</button>
                    </div>`;
                }).join('');
                document.getElementById('cart-total').innerText = "Total: R$ " + total.toLocaleString('pt-BR');
            },

            remCart: (idx) => { Core.cart.splice(idx,1); Core.updateCartUI(); document.getElementById('cart-dot').innerText = Core.cart.length; },

            checkout: () => {
                if(Core.cart.length === 0) return;
                let msg = "Olá Jefter Móveis! Quero comprar:\n\n" + Core.cart.map(i => `- ${i.title} (R$ ${i.price})`).join("\n");
                window.open(`https://wa.me/559992057452?text=${encodeURIComponent(msg)}`);
            },

            del: (id) => {
                Core.data.items = Core.data.items.filter(i => i.id !== id);
                localStorage.setItem('J_FINAL_V10', JSON.stringify(Core.data));
                Core.render();
            }
        };

        document.getElementById('p-file').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = () => Core.tempImg = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
