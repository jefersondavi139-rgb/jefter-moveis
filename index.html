<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEFTER MÓVEIS | Premium Store 🛋️</title>
    <style>
        :root {
            --bg: #050a14;
            --card: #0d1626;
            --neon-blue: #00d2ff;
            --royal: #0056ff;
            --gold: #ffcc00;
            --white: #ffffff;
        }

        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: var(--bg); color: var(--white);
            overflow-x: hidden;
        }

        /* TELA DE LOADING */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; justify-content: center;
            align-items: center; z-index: 5000; flex-direction: column;
        }
        .spinner {
            width: 60px; height: 60px; border: 6px solid #111;
            border-top-color: var(--neon-blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* BOAS VINDAS & LOGIN */
        #welcome-screen {
            position: fixed; top: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001f3f, #050a14);
            display: flex; justify-content: center; align-items: center; z-index: 4000;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); padding: 40px;
            border-radius: 30px; border: 1px solid var(--neon-blue);
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
        }

        .btn {
            width: 100%; padding: 15px; margin: 10px 0; border: none;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            font-size: 16px; transition: 0.3s; display: flex;
            align-items: center; justify-content: center; gap: 10px;
        }
        .btn-client { background: var(--white); color: #000; }
        .btn-adm { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-confirm { background: var(--royal); color: #fff; }

        /* HEADER & NAV */
        header {
            padding: 20px; background: var(--card);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--royal);
        }
        .logo-box { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1.2rem; }
        .logo-j { background: var(--neon-blue); color: #000; padding: 5px 12px; border-radius: 8px; }

        .tabs { display: flex; background: #08101d; sticky: top; z-index: 100; }
        .tab { 
            flex: 1; padding: 15px; text-align: center; cursor: pointer;
            border-bottom: 3px solid transparent; color: #555; font-weight: bold;
        }
        .tab.active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0,210,255,0.05); }

        /* PRODUTOS */
        .grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #1e2d44; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--neon-blue); }
        .card-img { width: 100%; height: 200px; background: #111; object-fit: cover; }
        .card-body { padding: 20px; }
        .stars { color: var(--gold); margin-bottom: 10px; }
        .price { font-size: 1.6rem; color: var(--neon-blue); font-weight: 900; margin: 10px 0; }

        /* PAINEL ADM FOOTER */
        #adm-panel {
            position: fixed; bottom: 0; width: 100%; background: #08101d;
            height: 80px; display: none; justify-content: space-around;
            align-items: center; border-top: 2px solid var(--neon-blue);
        }
        .fab {
            width: 70px; height: 70px; background: var(--neon-blue);
            border-radius: 50%; margin-top: -40px; display: flex;
            justify-content: center; align-items: center; font-size: 40px;
            color: #000; box-shadow: 0 0 20px var(--neon-blue); cursor: pointer;
        }

        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: var(--neon-blue); margin-top: 15px;">Segurança JEFTER ativada...</p>
    </div>

    <div id="welcome-screen">
        <div class="glass-box" id="login-main">
            <h1 id="display-store-name">JEFTER MÓVEIS</h1>
            <p>Móveis Novos, Usados e Seminovos com Qualidade Premium ✨</p>
            <button class="btn btn-client" onclick="auth('cliente')">👤 Logar como Cliente</button>
            <button class="btn btn-adm" onclick="showAdmLogin()">🔑 Logar como Admin</button>
        </div>

        <div class="glass-box hidden" id="adm-auth">
            <h2>Acesso do Dono</h2>
            <input type="text" id="user" placeholder="Usuário Admin">
            <input type="password" id="pass" placeholder="Senha Secreta">
            <button class="btn btn-confirm" onclick="auth('admin')">Entrar no Sistema</button>
            <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">Voltar</button>
        </div>
    </div>

    <header>
        <div class="logo-box">
            <div class="logo-j">J</div>
            <span id="header-store-name">JEFTER MÓVEIS</span>
        </div>
        <div>
            <span id="online-users">👤 0 Clientes Logados</span> | 🎧 <span id="support-link">Suporte</span>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="setTab('novos')">NOVOS</div>
        <div class="tab" onclick="setTab('usados')">USADOS</div>
        <div class="tab" onclick="setTab('seminovos')">SEMINOVOS</div>
    </div>

    <main class="grid" id="product-list"></main>

    <div id="adm-panel">
        <div onclick="configSite()" style="cursor:pointer">⚙️ Config</div>
        <div class="fab" onclick="postar()">+</div>
        <div onclick="alert('Histórico de Vendas')" style="cursor:pointer">💰 Vendas</div>
    </div>

    <footer style="text-align: center; padding: 40px; color: #444; font-size: 12px; margin-bottom: 80px;">
        Dono: <span id="owner-name">JEFTER JOSUÉ DOS SANTOS LISBOA</span><br>
        Suporte: <span id="support-number">(99) 9205-7452</span>
    </footer>

    <script>
        // LOGIN INFO
        const ADM_USER = "jefter_28";
        const ADM_PASS = "Josue_2808";

        // BANCO DE DADOS LOCAL (MEMÓRIA)
        let storeData = {
            name: "JEFTER MÓVEIS",
            support: "(99) 9205-7452",
            online: 1450,
            products: []
        };

        // CARREGAR AO INICIAR (RESOLVE ERRO DE LOGOUT)
        window.onload = () => {
            const savedLogin = localStorage.getItem('jefter_session');
            const savedData = localStorage.getItem('jefter_db');
            
            if(savedData) storeData = JSON.parse(savedData);
            
            if(savedLogin) {
                document.getElementById('welcome-screen').classList.add('hidden');
                if(savedLogin === 'admin') document.getElementById('adm-panel').style.display = 'flex';
                applyConfigs();
                render();
            }
        };

        function showAdmLogin() {
            document.getElementById('login-main').classList.add('hidden');
            document.getElementById('adm-auth').classList.remove('hidden');
        }

        // AUTHENTICAÇÃO (RESOLVE ERRO DE LOGIN)
        function auth(type) {
            if(type === 'admin') {
                const u = document.getElementById('user').value;
                const p = document.getElementById('pass').value;
                if(u !== ADM_USER || p !== ADM_PASS) return alert("Erro de Login!");
            }
            
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                localStorage.setItem('jefter_session', type);
                location.reload();
            }, 2500);
        }

        // CONFIGURAÇÕES DO ADM
        function configSite() {
            const newName = prompt("Mudar nome da loja:", storeData.name);
            const newSupp = prompt("Mudar WhatsApp Suporte:", storeData.support);
            const newOnline = prompt("Mudar Clientes Online:", storeData.online);
            
            if(newName) storeData.name = newName;
            if(newSupp) storeData.support = newSupp;
            if(newOnline) storeData.online = newOnline;
            
            save();
            applyConfigs();
        }

        function applyConfigs() {
            document.getElementById('display-store-name').innerText = storeData.name;
            document.getElementById('header-store-name').innerText = storeData.name;
            document.getElementById('support-number').innerText = storeData.support;
            document.getElementById('online-users').innerText = `👤 ${storeData.online} Clientes Logados`;
        }

        // POSTAGEM (RESOLVE ERRO DO CLIENTE NÃO VER)
        function postar() {
            const nome = prompt("Nome do Móvel:");
            const preco = prompt("Preço (R$):");
            const cat = prompt("Categoria (novos, usados, seminovos):");
            
            if(nome && preco) {
                storeData.products.push({
                    id: Date.now(),
                    nome, preco, cat: cat || 'novos',
                    estrelas: "⭐⭐⭐⭐⭐"
                });
                save();
                render();
            }
        }

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = storeData.products.map(p => `
                <div class="card">
                    <div class="card-img" style="display:flex; align-items:center; justify-content:center;">🖼️</div>
                    <div class="card-body">
                        <div class="stars">${p.estrelas}</div>
                        <h3>${p.nome}</h3>
                        <p class="price">R$ ${p.preco}</p>
                        <button class="btn btn-confirm" onclick="buy('${p.nome}')">Comprar Agora 🛒</button>
                    </div>
                </div>
            `).join('');
        }

        function save() {
            localStorage.setItem('jefter_db', JSON.stringify(storeData));
        }

        function buy(nome) {
            alert(`✅ Você escolheu: ${nome}\nEstamos redirecionando para o Pagamento PIX!\nSuporte: ${storeData.support}`);
            alert("Obrigado pela compra! Garantimos alta qualidade no seu novo móvel.");
        }
    </script>
</body>
</html>
