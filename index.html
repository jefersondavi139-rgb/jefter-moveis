<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefter Móveis | Original Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #03060f;
            --card: #0d162d;
            --neon-blue: #00d2ff;
            --neon-purple: #9d4eff;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #0a1c3d, transparent);
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* TELA DE LOADING (Foto 3) */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        .loader-logo {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border-radius: 25px; display: flex; justify-content: center; align-items: center;
            font-size: 50px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            margin-bottom: 25px;
        }

        .bar-bg { width: 250px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--neon-blue); transition: width 0.1s linear; }

        /* CONTAINERS GLASSMORPHISM (Fotos 1 e 2) */
        .container {
            width: 90%; max-width: 400px;
            background: var(--card);
            padding: 40px 30px; border-radius: 35px;
            text-align: center; margin: 40px 0;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            display: none; animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-main {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 22px; margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center; font-size: 40px;
        }

        /* BOTÕES E INPUTS */
        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            font-weight: 600; font-size: 15px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; color: white; text-transform: uppercase;
        }

        .btn-google { background: #fff; color: #000; border: none; margin-bottom: 20px; }
        .btn-blue { background: linear-gradient(to right, #00c6ff, #0072ff); box-shadow: 0 10px 20px rgba(0,114,255,0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--neon-purple); color: var(--neon-purple); }

        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 18px; top: 18px; color: var(--neon-blue); }
        input, select {
            width: 100%; padding: 18px 20px 18px 50px; border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
            color: white; font-size: 15px;
        }

        /* PAINEL E VITRINE */
        #admin-panel { display: none; width: 90%; max-width: 400px; }
        .vitrine { width: 90%; max-width: 400px; display: none; padding-bottom: 100px; }
        .card-item { background: var(--card); border-radius: 30px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .card-item img { width: 100%; border-radius: 20px; height: 230px; object-fit: cover; }
        
        .footer { padding: 30px; text-align: center; font-size: 12px; color: #8b9bb4; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-logo">🛋️</div>
        <h2 id="l-txt">Entrando... 🚀</h2>
        <div class="bar-bg"><div class="bar-fill" id="l-fill"></div></div>
    </div>

    <div class="container" id="tela-home" style="display: block;">
        <div class="logo-main">🛋️</div>
        <h1>JEFTER MÓVEIS</h1>
        <p style="opacity: 0.6; margin-bottom: 30px;">A melhor qualidade premium.</p>
        <button class="btn btn-blue" onclick="nav('tela-cliente')">🛒 Fazer Login como Cliente</button>
        <button class="btn btn-outline" onclick="nav('tela-admin-login')">🔐 Painel Administrativo</button>
    </div>

    <div class="container" id="tela-cliente">
        <div class="btn btn-google">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" height="20" style="margin-right:10px;"> Continuar com Google
        </div>
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="cli-nome" placeholder="Seu Nome"></div>
        <button class="btn btn-blue" onclick="entrar('cliente')">Entrar na Loja</button>
        <p onclick="nav('tela-home')" style="cursor:pointer; font-size:12px; opacity:0.5;">← Voltar</p>
    </div>

    <div class="container" id="tela-admin-login">
        <div style="font-size: 50px; margin-bottom: 15px;">🔐</div>
        <h2>Acesso Admin</h2>
        <div class="input-group"><i class="fas fa-user-shield"></i><input type="text" id="adm-user" placeholder="Usuário"></div>
        <div class="input-group"><i class="fas fa-key"></i><input type="password" id="adm-pass" placeholder="Senha"></div>
        <button class="btn btn-blue" style="background:var(--neon-purple);" onclick="entrar('admin')">Acessar Sistema</button>
        <p onclick="nav('tela-home')" style="cursor:pointer; font-size:12px; opacity:0.5;">← Voltar</p>
    </div>

    <div id="admin-panel">
        <div class="container" style="display:block; margin-top:0;">
            <h3>🛠️ Gerenciar Loja</h3>
            <input type="text" id="p-nome" placeholder="Nome do Produto" style="margin-bottom:10px;">
            <input type="text" id="p-preco" placeholder="Preço (R$)" style="margin-bottom:10px;">
            <input type="text" id="p-img" placeholder="Link da Foto" style="margin-bottom:10px;">
            <button class="btn btn-blue" onclick="postar()">Publicar Móvel</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <h3>⚙️ Configurações</h3>
            <input type="text" id="cfg-pix" placeholder="Chave PIX" style="margin-bottom:10px;">
            <input type="text" id="cfg-zap" placeholder="WhatsApp Suporte" style="margin-bottom:10px;">
            <button class="btn btn-outline" onclick="salvarCfg()">Salvar Tudo</button>
            <button class="btn" style="background:red; font-size:12px; margin-top:20px;" onclick="localStorage.clear(); location.reload();">Sair</button>
        </div>
    </div>

    <div class="vitrine" id="vitrine"></div>

    <div class="footer">
        <p id="f-zap">Suporte: (99) 9205-7452</p>
        <p>Postagens: 0 clientes já ligaram</p>
    </div>

    <script>
        const CRED = { u: "JEFFG", p: "rrJEFTER.ADMrr" };

        function nav(id) {
            document.querySelectorAll('.container, #admin-panel, .vitrine').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function entrar(tipo) {
            if(tipo === 'admin') {
                const u = document.getElementById('adm-user').value;
                const p = document.getElementById('adm-pass').value;
                if(u !== CRED.u || p !== CRED.p) return alert("Erro: Senha incorreta!");
            }

            const l = document.getElementById('loading-screen');
            const fill = document.getElementById('l-fill');
            const txt = document.getElementById('l-txt');
            l.style.display = 'flex';

            let w = 0;
            const msgs = ["Entrando... 🚀", "Carregando... 🛠️", "Sincronizando... ✅", "Pronto! ✨"];
            
            const timer = setInterval(() => {
                w += 4;
                fill.style.width = w + '%';
                if(w == 24) txt.innerText = msgs[1];
                if(w == 60) txt.innerText = msgs[2];
                if(w == 88) txt.innerText = msgs[3];

                if(w >= 100) {
                    clearInterval(timer);
                    l.style.display = 'none';
                    if(tipo === 'admin') {
                        localStorage.setItem("jefter_adm", "true");
                        nav('admin-panel');
                    } else {
                        nav('vitrine');
                    }
                    render();
                }
            }, 100);
        }

        function postar() {
            const n = document.getElementById('p-nome').value;
            const p = document.getElementById('p-preco').value;
            const i = document.getElementById('p-img').value;
            let list = JSON.parse(localStorage.getItem("loja_db")) || [];
            list.push({n, p, i});
            localStorage.setItem("loja_db", JSON.stringify(list));
            alert("Postado com sucesso!"); render();
        }

        function salvarCfg() {
            localStorage.setItem("loja_pix", document.getElementById('cfg-pix').value);
            localStorage.setItem("loja_zap", document.getElementById('cfg-zap').value);
            alert("Configurações salvas!"); location.reload();
        }

        function render() {
            const v = document.getElementById('vitrine');
            const list = JSON.parse(localStorage.getItem("loja_db")) || [];
            const zap = localStorage.getItem("loja_zap") || "9992057452";
            document.getElementById('f-zap').innerText = "Suporte: " + zap;
            
            v.innerHTML = <h2 style="text-align:center;">Nosso Catálogo</h2> + list.map(item => `
                <div class="card-item">
                    <img src="${item.i || 'https://via.placeholder.com/300'}">
                    <h3>${item.n}</h3>
                    <p style="color:var(--neon-blue); font-size:20px; font-weight:bold;">${item.p}</p>
                    <button class="btn btn-blue" onclick="window.open('https://wa.me/${zap}')">Comprar via WhatsApp</button>
                </div>
            `).join('');
        }

        window.onload = () => {
            if(localStorage.getItem("jefter_adm") === "true") {
                nav('admin-panel'); render();
                document.getElementById('cfg-pix').value = localStorage.getItem("loja_pix") || "";
                document.getElementById('cfg-zap').value = localStorage.getItem("loja_zap") || "";
            }
        };
    </script>
</body>
</html>
