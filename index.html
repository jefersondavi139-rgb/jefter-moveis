<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEFTER MÓVEIS | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e14;
            --card: #111821;
            --blue: #0095ff;
            --gold: #ffd700;
            --red: #ff4757;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: white; overflow: hidden; height: 100vh; }

        /* --- ANIMAÇÕES AVANÇADAS --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        /* --- TELAS --- */
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; animation: fadeIn 0.5s ease forwards; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        /* --- LOGIN & CARDS --- */
        .glass-card { background: var(--card); padding: 35px; border-radius: 30px; border: 1px solid #1c2530; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        .error-login { border: 2px solid var(--red) !important; animation: shake 0.4s ease; }
        
        .input-box { width: 100%; margin-bottom: 15px; background: #f1f2f6; border-radius: 15px; display: flex; align-items: center; padding: 0 15px; }
        .input-box i { color: var(--blue); }
        .input-box input { width: 100%; padding: 15px; border: none; background: transparent; outline: none; font-weight: 600; color: #2f3542; }

        /* --- BARRA DE CARREGAMENTO (3 SEGUNDOS) --- */
        .loader-content { text-align: center; animation: float 3s infinite ease-in-out; }
        .bar-container { width: 250px; height: 8px; background: #1c2530; border-radius: 10px; margin: 20px auto; overflow: hidden; border: 1px solid #333; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(to right, var(--blue), #00d4ff); border-radius: 10px; transition: 0.1s linear; }

        /* --- DASHBOARD & NAVEGAÇÃO --- */
        .top-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #0d121a; border-bottom: 1px solid #1c2530; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page-content { display: none; animation: fadeIn 0.3s ease; }
        .page-active { display: block; }

        /* --- MENU INFERIOR --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0d121a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1c2530; z-index: 100; }
        .nav-btn { color: #57606f; text-align: center; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-btn i { font-size: 22px; margin-bottom: 5px; display: block; }
        .nav-btn.active-link { color: var(--blue); transform: translateY(-5px); }
        .center-btn { background: var(--blue); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -40px; border: 6px solid var(--bg); color: white; font-size: 20px; box-shadow: 0 5px 15px rgba(0,149,255,0.4); }

        /* --- VITRINE --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .item-card { background: var(--card); border-radius: 20px; padding: 12px; border: 1px solid #1c2530; transition: 0.3s; }
        .item-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active" style="justify-content: center; align-items: center;">
        <div id="login-card" class="glass-card">
            <div style="font-size: 50px; color: var(--blue); margin-bottom: 15px;"><i class="fas fa-couch"></i></div>
            <h2 style="margin-bottom: 10px;">JEFTER MÓVEIS</h2>
            <p style="color: #a4b0be; font-size: 13px; margin-bottom: 25px;">Qualidade premium para seu lar</p>
            
            <div class="input-box"><i class="fas fa-user"></i><input type="text" id="user" placeholder="Usuário"></div>
            <div class="input-box"><i class="fas fa-lock"></i><input type="password" id="pass" placeholder="Senha ADM"></div>

            <button onclick="tentarAcesso()" style="width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 8px 20px rgba(0,149,255,0.3);">ENTRAR NO PAINEL</button>
            <p style="margin-top: 20px; font-size: 12px; color: #57606f; cursor: pointer;" onclick="entrarComoCliente()">Entrar como Visitante</p>
        </div>
    </div>

    <div id="screen-loading" class="screen" style="justify-content: center; align-items: center;">
        <div class="loader-content">
            <div style="font-size: 60px; color: var(--blue);"><i class="fas fa-circle-notch fa-spin"></i></div>
            <h2 style="margin-top: 20px; letter-spacing: 2px;">SINCRONIZANDO</h2>
            <div class="bar-container"><div id="fill" class="bar-fill"></div></div>
            <div id="perc" style="font-weight: bold; color: var(--blue);">0%</div>
        </div>
    </div>

    <div id="screen-dash" class="screen">
        <div class="top-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 45px; height: 45px; background: var(--blue); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold;">J</div>
                <div>
                    <div style="font-size: 14px; font-weight: bold;">JEFTER MÓVEIS</div>
                    <div id="status-user" style="font-size: 11px; color: #747d8c;">Modo Visitante</div>
                </div>
            </div>
            <i class="fas fa-sign-out-alt" style="color: var(--red); cursor: pointer;" onclick="sair()"></i>
        </div>

        <div class="content-area">
            <div id="page-produtos" class="page-content page-active">
                <h3 style="margin-bottom: 20px;">Coleção Exclusiva</h3>
                <div id="vitrine" class="grid">
                    </div>
            </div>

            <div id="page-vendas" class="page-content">
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-chart-line" style="font-size: 50px; color: #2ed573;"></i>
                    <h3 style="margin-top: 15px;">Relatório de Vendas</h3>
                    <p style="color: #747d8c; margin-top: 10px;">Nenhuma venda registrada hoje.</p>
                </div>
            </div>

            <div id="page-add" class="page-content">
                <h3 style="margin-bottom: 20px;">Postar Novo Móvel</h3>
                <div class="glass-card" style="width: 100%; max-width: none; text-align: left;">
                    <label style="font-size: 12px; color: var(--blue);">NOME DO PRODUTO</label>
                    <div class="input-box" style="margin-top: 5px;"><input type="text" id="pNome" placeholder="Ex: Sofá Retrátil"></div>
                    
                    <label style="font-size: 12px; color: var(--blue);">PREÇO DE VENDA</label>
                    <div class="input-box" style="margin-top: 5px;"><input type="text" id="pPreco" placeholder="R$ 0.000,00"></div>

                    <label style="font-size: 12px; color: var(--blue);">URL DA IMAGEM</label>
                    <div class="input-box" style="margin-top: 5px;"><input type="text" id="pImg" placeholder="Link da foto"></div>

                    <button onclick="salvarProduto()" style="width: 100%; padding: 15px; background: var(--blue); border: none; border-radius: 12px; color: white; font-weight: bold;">PUBLICAR NO SITE</button>
                </div>
            </div>

            <div id="page-config" class="page-content">
                <h3>Configurações</h3>
                <div style="margin-top: 20px; background: var(--card); padding: 15px; border-radius: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <span>Notificações</span>
                        <i class="fas fa-toggle-on" style="color: #2ed573; font-size: 24px;"></i>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>Modo Escuro</span>
                        <i class="fas fa-toggle-on" style="color: #2ed573; font-size: 24px;"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-btn active-link" onclick="mudarPagina('page-produtos', this)"><i class="fas fa-couch"></i>Produtos</div>
            <div class="nav-btn" onclick="mudarPagina('page-vendas', this)"><i class="fas fa-receipt"></i>Vendas</div>
            <div class="center-btn" onclick="mudarPagina('page-add', this)"><i class="fas fa-plus"></i></div>
            <div class="nav-btn" onclick="mudarPagina('page-config', this)"><i class="fas fa-cog"></i>Ajustes</div>
            <div class="nav-btn" style="color: var(--gold);"><i class="fas fa-crown"></i>ADM</div>
        </div>
    </div>

    <script>
        // --- LOGICA DE ACESSO ---
        function tentarAcesso() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const card = document.getElementById('login-card');

            if (u === "JEFFG" && p === "rrJEFTER.ADMrr") {
                localStorage.setItem('role', 'ADM');
                iniciarSistema();
            } else {
                // ANIMAÇÃO DE ACESSO NEGADO
                card.classList.add('error-login');
                setTimeout(() => card.classList.remove('error-login'), 500);
                alert("ACESSO NEGADO: Credenciais Inválidas!");
            }
        }

        function entrarComoCliente() {
            localStorage.setItem('role', 'VISITANTE');
            iniciarSistema();
        }

        function iniciarSistema() {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-loading').classList.add('active');
            
            let progresso = 0;
            const tempoTotal = 3000; // 3 Segundos
            const incremento = 100 / (tempoTotal / 50);

            const timer = setInterval(() => {
                progresso += incremento;
                if (progresso > 100) progresso = 100;
                
                document.getElementById('fill').style.width = progresso + "%";
                document.getElementById('perc').innerText = Math.floor(progresso) + "%";

                if (progresso >= 100) {
                    clearInterval(timer);
                    configurarDash();
                }
            }, 50);
        }

        function configurarDash() {
            const role = localStorage.getItem('role');
            document.getElementById('screen-loading').classList.remove('active');
            document.getElementById('screen-dash').classList.add('active');
            
            if (role === 'ADM') {
                document.getElementById('status-user').innerText = "Administrador Logado";
                document.getElementById('status-user').style.color = "#ffd700";
            } else {
                document.getElementById('status-user').innerText = "Modo Visitante";
                // Esconde funções de ADM para visitantes
                document.querySelector('.center-btn').style.display = 'none';
            }
            renderizarVitrine();
        }

        // --- NAVEGAÇÃO ENTRE PÁGINAS ---
        function mudarPagina(idPagina, botao) {
            const role = localStorage.getItem('role');
            
            // Bloqueio de segurança: Visitante não entra em Vendas ou Add
            if (role !== 'ADM' && (idPagina === 'page-vendas' || idPagina === 'page-add')) {
                alert("Apenas o Administrador Jeff pode acessar esta função!");
                return;
            }

            // Remove classes ativas
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('page-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-link'));

            // Ativa a nova página
            document.getElementById(idPagina).classList.add('page-active');
            if(botao.classList.contains('nav-btn')) {
                botao.classList.add('active-link');
            }
        }

        // --- SISTEMA DE PRODUTOS ---
        function salvarProduto() {
            const nome = document.getElementById('pNome').value;
            const preco = document.getElementById('pPreco').value;
            const img = document.getElementById('pImg').value;

            if (nome && preco && img) {
                let estoque = JSON.parse(localStorage.getItem('jeff_db')) || [];
                estoque.push({ nome, preco, img });
                localStorage.setItem('jeff_db', JSON.stringify(estoque));
                
                alert("Sucesso! O móvel já está na vitrine.");
                document.getElementById('pNome').value = "";
                document.getElementById('pPreco').value = "";
                document.getElementById('pImg').value = "";
                
                mudarPagina('page-produtos', document.querySelector('.nav-btn'));
                renderizarVitrine();
            } else {
                alert("Preencha todos os campos!");
            }
        }

        function renderizarVitrine() {
            const dados = JSON.parse(localStorage
