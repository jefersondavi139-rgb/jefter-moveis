<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEFTER MÓVEIS | V21</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue-glow: #00f2ff; --blue-main: #007bff; --bg-deep: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: #fff; font-family: 'Poppins', sans-serif; height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; overflow-y: auto; padding-bottom: 120px; background: var(--bg-deep); }
        .screen-active { display: flex !important; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input, select, textarea { width: 90%; max-width: 350px; padding: 16px; background: #0c0c0c; border: 1px solid #222; color: #fff; margin: 8px auto; border-radius: 10px; outline: none; display: block; }
        .btn-blue { width: 90%; max-width: 350px; padding: 18px; border: none; border-radius: 10px; font-weight: 600; background: var(--blue-main); color: #fff; cursor: pointer; margin: 10px auto; display: block; text-align: center; }
        header { padding: 25px; text-align: center; border-bottom: 1px solid #111; }
        .tabs-center { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .tab { color: #444; font-size: 12px; cursor: pointer; }
        .tab.active { color: var(--blue-glow); border-bottom: 2px solid var(--blue-glow); }
        .shelf { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: #0a0a0a; border-radius: 12px; padding: 10px; border: 1px solid #1a1a1a; }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; height: 75px; background: #080808; border: 1px solid #222; display: flex; justify-content: space-around; align-items: center; border-radius: 20px; z-index: 1000; }
        .nav-icon { font-size: 20px; cursor: pointer; }
    </style>
</head>
<body onload="App.init()">

    <div id="sc-shop" class="screen screen-active">
        <header><h2>JEFTER MÓVEIS</h2></header>
        <div class="tabs-center">
            <div class="tab active" onclick="App.render('novos')">NOVOS</div>
            <div class="tab" onclick="App.render('usados')">USADOS</div>
            <div class="tab" onclick="App.render('seminovos')">SEMI</div>
        </div>
        <div id="shelf" class="shelf"></div>
    </div>

    <div id="sc-cart" class="screen" style="padding:20px;">
        <h2>MEU CARRINHO</h2>
        <div id="cart-list"></div>
        <button class="btn-blue" onclick="App.go('sc-pix')">GERAR PIX</button>
    </div>

    <div id="sc-pix" class="screen" style="align-items:center; justify-content:center;">
        <h2>CHAVE PIX</h2>
        <div style="padding:20px; border:1px solid var(--blue-glow); border-radius:10px;">
            <p id="pix-key-display"></p>
        </div>
        <button class="btn-blue" onclick="App.go('sc-shop')">VOLTAR</button>
    </div>

    <div id="sc-evaluate" class="screen" style="padding:20px;">
        <h2>AVALIAR PRODUTO</h2>
        <input type="number" id="star-count" placeholder="Estrelas (1-5)" min="1" max="5">
        <textarea id="eval-text" placeholder="Sua opinião..."></textarea>
        <button class="btn-blue" onclick="alert('Avaliação enviada!')">ENVIAR</button>
    </div>

    <div id="sc-sales" class="screen" style="padding:20px;">
        <h2>VENDAS💸</h2>
        <div id="sales-list"></div>
    </div>

    <nav id="navbar">
        <div class="nav-icon" onclick="App.go('sc-shop')">🏠</div>
        <div class="nav-icon" id="nav-cart" onclick="App.go('sc-cart')">🛒</div>
        <div class="nav-icon" id="nav-sales" onclick="App.go('sc-sales')" style="display:none">💸</div>
        <div class="nav-icon" onclick="App.logout()">🚪</div>
    </nav>

    <script>
        let db = { items: [] }; 
        let cart = [];
        let isAdmin = localStorage.getItem('JEF_SESSION') === 'admin';

        const App = {
            init: async () => {
                // Simulação de carregamento de banco
                App.render('novos');
                if(isAdmin) {
                    document.getElementById('nav-cart').style.display = 'none';
                    document.getElementById('nav-sales').style.display = 'block';
                }
            },
            go: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
                document.getElementById(id).classList.add('screen-active');
            },
            render: (cat) => {
                const shelf = document.getElementById('shelf');
                shelf.innerHTML = `<div class="card">Produto Exemplo <button class="btn-blue" style="font-size:10px" onclick="${isAdmin ? "alert('Marcado como vendido!')" : "App.go('sc-evaluate')"}">${isAdmin ? "VENDIDO" : "🛒 ADICIONAR"}</button></div>`;
            },
            logout: () => {
                if(confirm("Deseja realmente sair?")) { localStorage.removeItem('JEF_SESSION'); location.reload(); }
            }
        };
    </script>
</body>
</html>
