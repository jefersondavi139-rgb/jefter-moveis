<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEFTER MÓVEIS | V11</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --gold: #d4af37;
            --cyan: #00f2ff;
            --card: #111111;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* TRAVA DE RECARREGAMENTO: O site só troca o que aparece, nunca recarrega a página */
        .page { display: none; height: 100vh; width: 100%; overflow-y: auto; padding-bottom: 100px; position: absolute; top: 0; left: 0; background: var(--bg); }
        .page-active { display: block !important; }

        /* TELA INICIAL IMPACTANTE */
        #page-intro { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: linear-gradient(to bottom, #000, #111); }
        .logo { font-family: 'Syncopate'; font-size: 35px; color: var(--gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); margin-bottom: 50px; }

        /* BOTÕES PREMIUM */
        .btn { width: 85%; max-width: 320px; padding: 20px; border: none; border-radius: 50px; font-weight: 700; text-transform: uppercase; margin: 12px 0; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: linear-gradient(135deg, #b8860b, var(--gold)); color: #000; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        .btn-outline { background: transparent; color: var(--cyan); border: 2px solid var(--cyan); }

        /* HEADER E LOJA */
        header { padding: 20px; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 10; }
        .tabs { display: flex; overflow-x: auto; background: #080808; padding: 10px; gap: 10px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 10px; font-size: 11px; font-weight: 600; color: #666; cursor: pointer; border: 1px solid transparent; }
        .tab.active { color: var(--gold); border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 12px; border: 1px solid var(--glass); }
        .card img { width: 100%; height: 160px; border-radius: 15px; object-fit: cover; }

        /* BARRA DE NAVEGAÇÃO */
        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass); z-index: 1000; }
        .nav-item { color: #555; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        /* MODAL SEM BUG */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 20000; }
        .modal-box { background: #111; padding: 40px; border-radius: 30px; width: 90%; max-width: 380px; border: 1px solid var(--gold); text-align: center; }
        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 15px; border: 1px solid #222; background: #000; color: #fff; text-align: center; }
    </style>
</head>
<body>

    <div id="p-intro" class="page page-active">
        <div class="logo">JEFTER<br>MÓVEIS</div>
        <button class="btn btn-gold" onclick="App.start('cli')">Explorar Catálogo</button>
        <button class="btn btn-outline" onclick="App.toggleM(true)">Área Restrita</button>
    </div>

    <div id="p-shop" class="page">
        <header>
            <div style="font-family:'Syncopate'; color:var(--gold)">J MÓVEIS</div>
            <div onclick="App.go('p-cart')">🛒 <span id="cart-n" style="color:var(--cyan)">0</span></div>
        </header>
        <div class="tabs">
            <div class="tab active" id="t-novos" onclick="App.cat('novos')">NOVOS</div>
            <div class="tab" id="t-usados" onclick="App.cat('usados')">USADOS</div>
            <div class="tab" id="t-seminovos" onclick="App.cat('seminovos')">SEMI-NOVOS</div>
        </div>
        <div id="shelf" class="grid"></div>
    </div>

    <div id="p-adm" class="page" style="padding: 30px;">
        <h2 style="color:var(--gold); margin-bottom: 30px;">CADASTRAR MÓVEL</h2>
        <input type="text" id="p-t" placeholder="Título do Móvel">
        <input type="text" id="p-p" placeholder="Preço (Ex: 1.500)">
        <select id="p-c" style="width:100%; padding:18px; border-radius:15px; background:#000; color:#fff; border:1px solid #222; margin-bottom:10px;">
            <option value="novos">Novos</option>
            <option value="usados">Usados</option>
            <option value="seminovos">Semi-Novos</option>
        </select>
        <input type="file" id="p-f" accept="image/*">
        <button class="btn btn-gold" style="width:100%" onclick="App.save()">Publicar Agora</button>
    </div>

    <div id="p-cart" class="page" style="padding: 25px;">
        <h2 style="margin-bottom: 20px;">MEUS INTERESSES</h2>
        <div id="cart-box"></div>
        <div id="cart-total" style="font-size:24px; color:var(--gold); margin: 30px 0;">Total: R$ 0,00</div>
        <button class="btn btn-gold" style="width:100%" onclick="App.zap()">Finalizar no WhatsApp</button>
    </div>

    <div id="m-login" class="modal">
        <div class="modal-box">
            <h3 style="color:var(--gold); margin-bottom:20px;">ACESSO ADMIN</h3>
            <p id="err" style="color:red; font-size:12px; display:none; margin-bottom:10px;">Usuário ou senha inválidos!</p>
            <input type="text" id="u" placeholder="Login">
            <input type="password" id="s" placeholder="Senha">
            <button class="btn btn-gold" style="width:100%" onclick="App.login()">Entrar</button>
            <button class="btn btn-outline" style="width:100%" onclick="App.toggleM(false)">Voltar</button>
        </div>
    </div>

    <nav id="nav-bar">
        <div class="nav-item" onclick="App.go('p-shop')">🏠<br>Loja</div>
        <div class="nav-item" onclick="App.go('p-cart')">🛒<br>Carrinho</div>
        <div id="nav-adm" class="nav-item" style="display:none" onclick="App.go('p-adm')">➕<br>Cadastrar</div>
        <div class="nav-item" onclick="location.reload()">🚪<br>Sair</div>
    </nav>

    <script>
        const App = {
            db: JSON.parse(localStorage.getItem('J_V11_DB')) || { items: [] },
            cart: [],
            currentCat: 'novos',
            imgBase64: "",

            // FUNÇÃO CHAVE: Muda a tela sem recarregar a página (Evita o bug do vídeo)
            go: (id) => {
                event?.preventDefault(); // Bloqueia qualquer ação do navegador que possa recarregar
                document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
                document.getElementById(id).classList.add('page-active');
                window.scrollTo(0,0);
            },

            start: (role) => {
                document.getElementById('nav-bar').style.display = 'flex';
                if(role === 'adm') document.getElementById('nav-adm').style.display = 'block';
                App.go('p-shop');
                App.render();
            },

            toggleM: (s) => { document.getElementById('m-login').style.display = s ? 'flex' : 'none'; },

            login: () => {
                if(document.getElementById('u').value === "jefter_28" && document.getElementById('s').value === "Josue_2808") {
                    App.toggleM(false); App.start('adm');
                } else { document.getElementById('err').style.display = 'block'; }
            },

            cat: (c) => {
                App.currentCat = c;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.getElementById('t-'+c).classList.add('active');
                App.render();
            },

            render: () => {
                const shelf = document.getElementById('shelf');
                const filter = App.db.items.filter(i => i.cat === App.currentCat);
                shelf.innerHTML = filter.map(i => `
                    <div class="card">
                        <img src="${i.img}">
                        <div style="font-size:12px; font-weight:600; margin-top:10px;">${i.title}</div>
                        <div style="color:var(--cyan); font-weight:700;">R$ ${i.price}</div>
                        <button class="btn btn-gold" style="padding:10px; font-size:10px; width:100%;" onclick="App.addCart(${i.id})">ADICIONAR</button>
                        ${document.getElementById('nav-adm').style.display === 'block' ? `<button onclick="App.del(${i.id})" style="background:none; border:none; color:red; font-size:9px; width:100%; margin-top:8px;">Excluir</button>` : ''}
                    </div>
                `).join('');
            },

            save: () => {
                const title = document.getElementById('p-t').value;
                const price = document.getElementById('p-p').value;
                const cat = document.getElementById('p-c').value;
                if(!title || !App.imgBase64) return;
                App.db.items.push({ id: Date.now(), title, price, cat, img: App.imgBase64 });
                localStorage.setItem('J_V11_DB', JSON.stringify(App.db));
                App.go('p-shop'); App.render();
            },

            addCart: (id) => {
                App.cart.push(App.db.items.find(i => i.id === id));
                document.getElementById('cart-n').innerText = App.cart.length;
                App.updateUI();
                App.go('p-cart');
            },

            updateUI: () => {
                const box = document.getElementById('cart-box');
                let total = 0;
                box.innerHTML = App.cart.map((i, idx) => {
                    total += parseFloat(i.price.replace('.','').replace(',','.'));
                    return `<div style="display:flex; background:var(--glass); padding:15px; border-radius:15px; margin-bottom:10px; align-items:center;">
                        <img src="${i.img}" style="width:50px; height:50px; border-radius:10px; margin
